<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>คู่มือผู้เข้าร่วม — NEXT Passport</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=IBM+Plex+Sans+Thai:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  /* ===== Solar CI ===== */
  :root{
    --accent:#000; --accent-soft:rgba(255,255,255,.18); --glow:rgba(255,120,40,.55);
    --surface:rgba(20,0,2,.30); --surface-brd:rgba(255,255,255,.32); --line:rgba(255,255,255,.26);
    --muted:rgba(255,236,227,.85); --chip:rgba(0,0,0,.26); --text:#fff; --cta-bg:#fff; --cta-text:#b3160a; --gold:#FFD98A;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0; color:var(--text); font-family:'IBM Plex Sans Thai',sans-serif; overflow:hidden;
    background:linear-gradient(158deg,#F37100 0%,#D92000 48%,#5A0006 100%); background-attachment:fixed;
  }
  .deck{ height:100dvh; display:flex; flex-direction:column; position:relative; z-index:2; }
  .slide{ flex:1; display:none; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:26px 26px 96px; max-width:760px; margin:0 auto; width:100%; }
  .slide.on{ display:flex; animation:in .38s ease; }
  @keyframes in{ from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:none;} }
  .brand-logo{ width:min(420px,92%); height:auto; filter:drop-shadow(0 0 34px rgba(255,120,30,.45)); }
  .passport-word{ font-family:'Chakra Petch'; font-weight:700; font-size:clamp(26px,6vw,44px); letter-spacing:.16em; margin-top:22px; color:#fff; }
  .lead{ color:var(--muted); font-size:clamp(15px,2.6vw,19px); line-height:1.7; margin:14px 0 0; text-wrap:balance; }
  .step{ display:inline-flex; align-items:center; gap:8px; background:var(--cta-bg); color:var(--cta-text); font-family:'Chakra Petch'; font-weight:700; font-size:12px; letter-spacing:.14em; border-radius:99px; padding:7px 16px; margin-bottom:16px; }
  h1{ font-family:'Chakra Petch'; font-weight:600; font-size:clamp(24px,5vw,40px); margin:0 0 12px; line-height:1.25; text-wrap:balance; }
  h1 .em{ color:var(--gold); }
  ul.big{ list-style:none; padding:0; margin:8px 0 0; text-align:left; max-width:580px; width:100%; }
  ul.big li{ background:var(--surface); border:1px solid var(--surface-brd); border-radius:14px; padding:14px 16px; margin:10px 0; font-size:clamp(14.5px,2.5vw,17px); line-height:1.55; display:flex; gap:13px; align-items:flex-start; }
  ul.big li b{ color:var(--gold); font-weight:600; }
  ul.big li.one-line{ justify-content:center; text-align:center; }
  .ic{ flex:0 0 auto; width:34px; height:34px; border-radius:10px; background:var(--accent-soft); border:1px solid var(--surface-brd); display:flex; align-items:center; justify-content:center; color:#fff; }
  .stamps{ display:flex; gap:16px; margin-top:22px; }
  .stamp{ width:82px; height:82px; border-radius:50%; border:3px solid var(--gold); color:var(--gold); display:flex; align-items:center; justify-content:center; background:rgba(255,217,138,.14); transform:rotate(-8deg); box-shadow:0 0 18px rgba(255,217,138,.3); }
  .stamp:nth-child(2){ transform:rotate(5deg); } .stamp:nth-child(3){ transform:rotate(-3deg); }
  .nav{ position:fixed; bottom:0; left:0; right:0; z-index:5; display:flex; justify-content:space-between; align-items:center; padding:14px 18px calc(14px + env(safe-area-inset-bottom)); gap:12px; background:linear-gradient(180deg, transparent, rgba(60,10,2,.7) 45%); }
  .nav button{ font-family:'Chakra Petch'; font-weight:600; border-radius:12px; padding:12px 22px; cursor:pointer; border:1px solid var(--surface-brd); background:var(--chip); color:var(--text); font-size:14.5px; }
  .nav button.primary{ background:var(--cta-bg); color:var(--cta-text); border:none; box-shadow:0 10px 26px var(--glow); }
  .dots{ display:flex; gap:6px; }
  .dots i{ width:8px; height:8px; border-radius:50%; background:var(--line); }
  .dots i.on{ background:#fff; }
  .cf{ position:fixed; top:-14px; width:10px; height:14px; z-index:9; pointer-events:none; animation:fall linear forwards; }
  @keyframes fall{ to{ transform:translateY(110vh) rotate(720deg); opacity:.4; } }
  @media (prefers-reduced-motion:reduce){*{animation:none!important; transition:none!important;}}
</style>
</head>
<body>
<div class="deck" id="deck"></div>
<div class="nav">
  <button id="prev">← ก่อนหน้า</button>
  <div class="dots" id="dots"></div>
  <button id="next" class="primary">ถัดไป →</button>
</div>

<script>
var LOGO="ainext-logo-bizcore.png";
function I(name){
  var p={
    ticket:'<rect x="3" y="6" width="18" height="12" rx="2"></rect><path d="M3 10h18M9 6v12"></path>',
    award:'<circle cx="12" cy="8" r="6"></circle><path d="M15.5 12.9 17 22l-5-3-5 3 1.5-9.1"></path>',
    trophy:'<path d="M8 21h8M12 17v4M7 4h10v4a5 5 0 0 1-10 0V4z"></path><path d="M5 4H3v2a3 3 0 0 0 3 3M19 4h2v2a3 3 0 0 1-3 3"></path>',
    user:'<circle cx="12" cy="8" r="4"></circle><path d="M4 21a8 8 0 0 1 16 0"></path>',
    chat:'<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>',
    check:'<path d="M20 6 9 17l-5-5"></path>',
    id:'<rect x="3" y="5" width="18" height="14" rx="2"></rect><circle cx="9" cy="12" r="2"></circle><path d="M14 10h4M14 14h4"></path>',
    users:'<circle cx="9" cy="8" r="3.2"></circle><path d="M3.5 20a5.5 5.5 0 0 1 11 0"></path><path d="M16 5.5a3 3 0 0 1 0 5.8M20.5 20a5.5 5.5 0 0 0-4-5.3"></path>',
    food:'<path d="M4 3v7a3 3 0 0 0 6 0V3M7 3v18"></path><path d="M17 3c-1.5 0-3 1.8-3 5s1.5 4 3 4v6"></path>',
    link:'<path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1"></path><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"></path>',
    star:'<path d="M12 3l2.6 5.6L21 9.3l-4.5 4.2 1.1 6.1L12 16.8 6.4 19.6l1.1-6.1L3 9.3l6.4-.7z"></path>',
    refresh:'<path d="M21 12a9 9 0 1 1-3-6.7L21 8"></path><path d="M21 3v5h-5"></path>',
    vote:'<path d="M9 11l3 3L22 4"></path><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>',
    doc:'<path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path><path d="M14 3v6h6"></path>',
    rocket:'<path d="M5 15c-1.5 1.3-2 5-2 5s3.7-.5 5-2M9 11a9 9 0 0 1 9-9c0 4-2 7-6 9l-3-1z"></path><circle cx="14.5" cy="6.5" r="1.4"></circle>'
  };
  return '<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+(p[name]||'')+'</svg>';
}
function li(icon, html){ return '<li><span class="ic">'+I(icon)+'</span><span>'+html+'</span></li>'; }

var slides=[
  // 1 · Title
  '<section class="slide"><img class="brand-logo" src="'+LOGO+'" alt="AI NEXT by Bizcore"><div class="passport-word">NEXT PASSPORT</div><p class="lead">Track Missions เพื่อรับ Certificate<br>AI NEXT Bootcamp · by Bizcore</p></section>',
  // 2 · Concept
  '<section class="slide"><div class="step">'+I('ticket')+' CONCEPT</div><h1>NEXT Passport คืออะไร?</h1><ul class="big">'
    + li('award','<b>พาสปอร์ตดิจิทัล</b>เพื่อสะสมแสตมป์ 3 ดวง จากการทำ Missions สั้น ๆ ระหว่างวัน')
    + li('trophy','ได้แสตมป์ครบ <b>3 ดวง</b> = อยู่ครบตลอดทั้งวัน → ได้รับ <b>Certificate</b>')
    + '</ul><div class="stamps"><div class="stamp">'+I('check')+'</div><div class="stamp">'+I('check')+'</div><div class="stamp">'+I('check')+'</div></div></section>',
  // 3 · Check-in
  '<section class="slide"><div class="step">STEP 1 · ตอนเช้า</div><h1>เช็คอินเข้างาน</h1><ul class="big">'
    + li('user','<b>สแกน QR ของงาน</b> เพื่อเปิดเว็บ NEXT Passport')
    + li('doc','กรอก<b>ชื่อจริง</b>ของคุณ (ตามที่ลงทะเบียน) — ถ้าซ้ำ ระบบให้เลือกชื่อ')
    + li('check','กด <b>"เช็คอิน"</b>')
    + '</ul></section>',
  // 4 · OpenChat
  '<section class="slide"><div class="step">STEP 2</div><h1>เข้ากลุ่ม LINE OpenChat</h1><ul class="big">'
    + li('chat','<b>สแกน QR</b> หรือกดปุ่มเขียว "เข้ากลุ่ม LINE OpenChat" แล้วกด Join')
    + li('check','กลับมาที่เว็บ แตะ <b>"ฉันเข้ากลุ่มแล้ว"</b> + ยินยอม PDPA แล้วกดยืนยัน')
    + li('chat','กลุ่มนี้ใช้ <b>รับโจทย์ · ส่งงาน · ติดตามประกาศ</b> ตลอดทั้งวัน')
    + '</ul></section>',
  // 5 · Remember 3
  '<section class="slide"><div class="step">STEP 3</div><h1>จำ 3 อย่างนี้จากหน้าจอ</h1><ul class="big">'
    + li('id','<b>Attendee ID</b> ของคุณ')
    + li('users','<b>ทีม / Group</b> — นั่งและทำ Challenge กับกลุ่มนี้')
    + li('food','<b>เมนูอาหารกลางวัน</b> ที่คุณเลือกไว้ตอนสมัคร')
    + '</ul></section>',
  // 6 · Missions
  '<section class="slide"><div class="step">MISSIONS</div><h1>3 Missions ระหว่างวัน</h1><ul class="big">'
    + li('star','Mission 1 · หลังจบ session <b>Mew Social</b>')
    + li('star','Mission 2 · หลังจบ session <b>DataRockie</b>')
    + li('vote','Mission 3 · <b>AI NEXT Challenge</b> — โหวตทีมในกลุ่มของคุณ + แบบสอบถามปิดงาน')
    + '</ul></section>',
  // 7 · How to
  '<section class="slide"><div class="step">HOW TO</div><h1>ทำ Mission ยังไง?</h1><ul class="big">'
    + li('link','เปิด<b>ลิงก์เดิม</b> (หรือสแกน QR เดิม) — ระบบจำคุณได้ ไม่ต้องเช็คอินใหม่')
    + li('star','แสตมป์ดวงไหนขึ้น <b>"ทำเลย"</b> แตะทำได้ทันที')
    + li('award','ตอบครบ กดส่ง <b>รับแสตมป์ทันที</b>')
    + '</ul></section>',
  // 8 · Certificate
  '<section class="slide"><div class="step">'+I('trophy')+' CERTIFICATE</div><h1>กติการับ Certificate</h1><ul class="big">'
    + li('check','เช็คอินตอนเช้า + <b>แสตมป์ครบ 3 ดวง</b> = มีสิทธิ์รับ Certificate')
    + li('doc','ชื่อบน Certificate ใช้<b>ชื่อที่กรอกตอนสมัคร</b>')
    + '</ul></section>',
  // 9 · Last
  '<section class="slide"><img class="brand-logo" src="'+LOGO+'" alt="AI NEXT by Bizcore" style="width:min(360px,86%)"><h1 class="em" style="margin-top:22px">พร้อมแล้ว ไปให้สุด!</h1><p class="lead">ติดปัญหาตรงไหน ทักทีมงานที่จุดลงทะเบียนได้ตลอดทั้งวัน<br>ขอให้สนุกกับการเรียนรู้</p></section>'
];

var deck=document.getElementById('deck'); deck.innerHTML=slides.join('');
var els=[].slice.call(document.querySelectorAll('.slide')), cur=0;
var dots=document.getElementById('dots');
els.forEach(function(_,i){ var d=document.createElement('i'); if(i===0)d.className='on'; dots.appendChild(d); });
els[0].classList.add('on');
// จัดกึ่งกลาง bullet ที่มีข้อความบรรทัดเดียว (บรรทัดยาว/หลายบรรทัด = ชิดซ้าย)
function centerBullets(slide){
  if(!slide) return;
  [].slice.call(slide.querySelectorAll('ul.big li')).forEach(function(li){
    var span=li.children[li.children.length-1];
    if(!span) return;
    var lh=parseFloat(getComputedStyle(span).lineHeight)||24;
    li.classList.toggle('one-line', span.offsetHeight <= lh*1.6);
  });
}
function go(n){
  cur=Math.max(0,Math.min(els.length-1,n));
  els.forEach(function(s,i){ s.classList.toggle('on',i===cur); });
  [].slice.call(dots.children).forEach(function(d,i){ d.className=i===cur?'on':''; });
  document.getElementById('next').textContent = cur===els.length-1 ? 'จบคู่มือ ✓' : 'ถัดไป →';
  centerBullets(els[cur]);
  if(cur===els.length-1) confetti();
}
window.addEventListener('resize', function(){ centerBullets(els[cur]); });
document.getElementById('next').onclick=function(){ if(cur<els.length-1) go(cur+1); };
document.getElementById('prev').onclick=function(){ go(cur-1); };
document.addEventListener('keydown',function(e){ if(e.key==='ArrowRight'||e.key===' ')go(cur+1); if(e.key==='ArrowLeft')go(cur-1); });
var x0=null;
document.addEventListener('touchstart',function(e){ x0=e.touches[0].clientX; },{passive:true});
document.addEventListener('touchend',function(e){ if(x0===null)return; var dx=e.changedTouches[0].clientX-x0; if(Math.abs(dx)>50) go(cur+(dx<0?1:-1)); x0=null; },{passive:true});

function confetti(){
  var cols=['#FFD98A','#FF8A3C','#fff','#FF5A1F'];
  for(var i=0;i<32;i++){ var d=document.createElement('div'); d.className='cf';
    d.style.left=(Math.random()*100)+'vw'; d.style.background=cols[i%cols.length];
    d.style.animationDuration=(1.7+Math.random()*1.9)+'s'; d.style.transform='rotate('+(Math.random()*360)+'deg)';
    document.body.appendChild(d); setTimeout((function(el){return function(){el.remove();};})(d),4200);
  }
}
</script>
</body>
</html>
