<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI NEXT — Staff Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=IBM+Plex+Sans+Thai:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --accent:#fff; --accent-soft:rgba(255,255,255,.18); --glow:rgba(255,120,40,.55);
    --surface:rgba(20,0,2,.30); --surface-brd:rgba(255,255,255,.32); --line:rgba(255,255,255,.26);
    --muted:rgba(255,236,227,.85); --chip:rgba(0,0,0,.26); --bar:rgba(90,10,4,.35);
    --text:#fff; --cta-bg:#fff; --cta-text:#b3160a;
  }
  *{box-sizing:border-box;}
  body{ margin:0; min-height:100vh; color:var(--text); font-family:'IBM Plex Sans Thai',sans-serif;
    background: linear-gradient(158deg,#F37100 0%,#D92000 48%,#5A0006 100%); background-attachment:fixed; }
  .header{ background:var(--bar); border-bottom:1px solid var(--surface-brd); padding:18px 20px; display:flex; align-items:center; justify-content:center; gap:10px; }
  .header img{ height:24px; width:auto; display:block; }
  .header h1{ font-family:'Chakra Petch',sans-serif; font-weight:700; margin:0; font-size:20px; }
  .wrap{ max-width:680px; margin:0 auto; padding:24px 18px 60px; }
  .card{ background:var(--surface); border:1px solid var(--surface-brd); border-radius:16px; padding:22px 20px; margin-bottom:16px; }
  h2{ font-family:'Chakra Petch',sans-serif; font-weight:600; font-size:15px; color:var(--accent); margin-top:0; }
  input[type=password], input[type=text]{ width:100%; padding:12px 14px; border-radius:10px; border:1px solid var(--surface-brd);
    background:var(--chip); color:var(--text); font-family:'IBM Plex Sans Thai'; font-size:15px; margin-bottom:12px; }
  button{ cursor:pointer; background:var(--cta-bg); color:var(--cta-text); border:none; border-radius:10px;
    padding:12px 16px; font-family:'Chakra Petch',sans-serif; font-weight:600; font-size:14px; }
  button.small{ padding:8px 12px; font-size:12px; }
  button:disabled{ opacity:.5; }
  .error{ color:#fff; background:rgba(0,0,0,.3); border:1px solid var(--surface-brd); padding:10px 12px; border-radius:10px; font-size:13px; margin-bottom:12px;}
  .stage-row{ display:flex; align-items:center; justify-content:space-between; padding:14px 0; border-bottom:1px solid var(--line); }
  .stage-row:last-child{ border-bottom:none; }
  .stage-name{ font-weight:600; font-size:14px; font-family:'Chakra Petch'; }
  .badge{ font-size:11px; padding:4px 10px; border-radius:20px; margin-left:8px; font-family:'Chakra Petch'; }
  .badge.open{ background:var(--cta-bg); color:var(--cta-text); }
  .badge.closed{ background:rgba(255,255,255,.08); color:var(--muted); border:1px solid var(--surface-brd); }
  .toggle-btn{ min-width:100px; }
  .stats-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; text-align:center; }
  .stat{ background:var(--chip); border:1px solid var(--surface-brd); border-radius:12px; padding:14px 6px; }
  .stat .num{ font-family:'Chakra Petch'; font-weight:700; font-size:22px; color:var(--accent); }
  .stat .lbl{ font-size:11px; color:var(--muted); margin-top:4px;}
  .refresh-hint{ text-align:center; font-size:11px; color:var(--muted); margin-top:6px;}
  .p-row{ border:1px solid var(--surface-brd); border-radius:12px; padding:12px 14px; margin-bottom:10px; }
  .p-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .p-name{ font-weight:600; font-size:14px; font-family:'Chakra Petch'; }
  .p-id{ font-size:11px; color:var(--muted); }
  .p-flags{ display:flex; flex-wrap:wrap; gap:8px; }
  .flag-btn{ width:auto; font-size:11px; padding:6px 10px; background:rgba(255,255,255,.08); border:1px solid var(--surface-brd); color:var(--text); }
  .flag-btn.on{ background:var(--cta-bg); color:var(--cta-text); border-color:transparent; }
  .search-row{ display:flex; gap:8px; }
  .search-row input{ margin-bottom:0; }
  .search-row button{ width:auto; white-space:nowrap; }
  a.admin-back{ color:var(--muted); font-family:'Chakra Petch'; font-size:12px; display:inline-flex; align-items:center; gap:6px; }
</style>
</head>
<body>
<div class="header"><img src="ainext-logo-bizcore.png" alt="AI NEXT"><h1>Staff Admin</h1></div>
<div class="wrap" id="app"></div>

<script>
/* ตั้ง DEMO_MODE=false และวาง URL เว็บแอปที่ API_BASE_URL หลัง Deploy (ให้ตรงกับ index.html) */
const DEMO_MODE = false;
const API_BASE_URL = "https://script.google.com/macros/s/AKfycbwBjLK0dyM7RsVtwoPoPCVuCA9GngcXbJXVlLlDjIzJIUaq5_zXOneEdFDDNaAuK8WZAg/exec";

/* ===== DEMO mock (ใช้ localStorage ชุดเดียวกับ index.html) ===== */
const LS_ROSTER='ainext_m_roster', LS_CONFIG='ainext_m_config', LS_GALLERY='ainext_m_gallery';
function readLS(k){ return JSON.parse(localStorage.getItem(k)||'null'); }
function writeLS(k,v){ localStorage.setItem(k, JSON.stringify(v)); }
function normalizeName(s){ return String(s||'').trim().toLowerCase().replace(/\s+/g,' '); }
function mockApi(action, params){
  return new Promise(resolve=>{ setTimeout(()=>{
    const cfg=readLS(LS_CONFIG)||{}; let roster=readLS(LS_ROSTER)||[];
    const bad = ()=> String(params.password)!==String(cfg.admin_password||'ainext2026');
    if(action==='adminLogin') return resolve({success: String(params.password)===String(cfg.admin_password||'ainext2026')});
    if(bad()) return resolve({success:false, reason:'bad_password'});
    if(action==='adminStats'){
      const s={total:roster.length, confirmed:roster.length, checkin:0, m1:0,m2:0,m3:0,cert:0,openchat:0,
        checkin_open:!!cfg.checkin_open, mission1_open:!!cfg.mission1_open, mission2_open:!!cfg.mission2_open, mission3_open:!!cfg.mission3_open, cert_open:!!cfg.cert_open,
        galleryPosts:(readLS(LS_GALLERY)||[]).length};
      roster.forEach(p=>{ if(p.checkedIn)s.checkin++; if(p.m1)s.m1++; if(p.m2)s.m2++; if(p.m3)s.m3++; if(p.cert)s.cert++; if(p.joinedOpenChat)s.openchat++; });
      return resolve({success:true, stats:s});
    }
    if(action==='adminSetOpen'){
      const map={checkin:'checkin_open',m1:'mission1_open',m2:'mission2_open',m3:'mission3_open',cert:'cert_open'};
      const k=map[params.key]; if(k){ cfg[k]=!!params.open; if(params.key==='cert'&&params.open){ roster.forEach(p=>{ if(p.m1&&p.m2&&p.m3) p.cert=true; }); writeLS(LS_ROSTER,roster);} writeLS(LS_CONFIG,cfg); }
      return resolve({success:true, stats:(function(){ const s={total:roster.length,confirmed:roster.length,checkin:0,m1:0,m2:0,m3:0,cert:0,openchat:0,checkin_open:!!cfg.checkin_open,mission1_open:!!cfg.mission1_open,mission2_open:!!cfg.mission2_open,mission3_open:!!cfg.mission3_open,cert_open:!!cfg.cert_open,galleryPosts:(readLS(LS_GALLERY)||[]).length}; roster.forEach(p=>{ if(p.checkedIn)s.checkin++; if(p.m1)s.m1++; if(p.m2)s.m2++; if(p.m3)s.m3++; if(p.cert)s.cert++; if(p.joinedOpenChat)s.openchat++; }); return s; })()});
    }
    if(action==='adminSearchParticipants'){
      const q=normalizeName(params.query||''); let rows=roster;
      if(q) rows=rows.filter(p=>normalizeName(p.no+' '+p.runNo+' '+p.name+' '+p.nick+' '+p.team).includes(q));
      return resolve({success:true, items:rows.slice(0,50).map(p=>({attendeeId:p.no,runNo:p.runNo,name:p.name,nick:p.nick,team:p.team,checkin:!!p.checkedIn,openchat:!!p.joinedOpenChat,m1:!!p.m1,m2:!!p.m2,m3:!!p.m3,cert:!!p.cert}))});
    }
    if(action==='adminUpdateParticipant'){
      const p=roster.find(x=>String(x.no)===String(params.attendeeId)); if(!p) return resolve({success:false});
      const patch=params.patch||{};
      if(typeof patch.checkin==='boolean') p.checkedIn=patch.checkin;
      if(typeof patch.openchat==='boolean') p.joinedOpenChat=patch.openchat;
      ['m1','m2','m3','cert'].forEach(k=>{ if(typeof patch[k]==='boolean') p[k]=patch[k]; });
      writeLS(LS_ROSTER,roster); return resolve({success:true});
    }
    resolve({success:false, error:'unknown_action'});
  },140); });
}
async function callApi(action, params={}){
  if(DEMO_MODE) return mockApi(action, params);
  const res=await fetch(API_BASE_URL,{method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify({action,...params})});
  return res.json();
}

const app=document.getElementById('app'); let PASSWORD=null, pollTimer=null;
function backLink(){ return `<p style="text-align:center;"><a class="admin-back" href="index.html"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 18l-6-6 6-6"></path></svg>กลับหน้าลงทะเบียน</a></p>`; }

function screenLogin(err=''){
  app.innerHTML=`<div class="card"><h2>เข้าสู่ระบบทีมงาน</h2>${err?`<div class="error">${err}</div>`:''}
    <input type="password" id="pw" placeholder="Admin password"><button id="loginBtn">เข้าสู่ระบบ</button></div>${backLink()}`;
  document.getElementById('loginBtn').onclick=doLogin;
  document.getElementById('pw').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
}
async function doLogin(){ const pw=document.getElementById('pw').value; const res=await callApi('adminLogin',{password:pw});
  if(!res.success){ screenLogin('รหัสผ่านไม่ถูกต้อง'); return; } PASSWORD=pw; screenDashboard(); }

const STAGES=[
  {key:'checkin', label:'เช็คอิน (Check-in + OpenChat)'},
  {key:'m1', label:'Mission 1 · Session แรก'},
  {key:'m2', label:'Mission 2 · Session สอง'},
  {key:'m3', label:'Mission 3 · Challenge + ปิดงาน'},
  {key:'cert', label:'ปล่อย E-Certificate'}
];
const STAGE_CFGKEY={checkin:'checkin_open', m1:'mission1_open', m2:'mission2_open', m3:'mission3_open', cert:'cert_open'};
let searchCache=[], lastQuery='';

async function screenDashboard(){
  const res=await callApi('adminStats',{password:PASSWORD});
  if(!res.success){ screenLogin('เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่'); return; }
  const s=res.stats;
  app.innerHTML=`
    <div class="card">
      <h2>ภาพรวม</h2>
      <div class="stats-grid">
        <div class="stat"><div class="num">${s.total}</div><div class="lbl">รายชื่อทั้งหมด</div></div>
        <div class="stat"><div class="num">${s.checkin}</div><div class="lbl">เช็คอินแล้ว</div></div>
        <div class="stat"><div class="num">${s.openchat}</div><div class="lbl">เข้า OpenChat</div></div>
        <div class="stat"><div class="num">${s.m1}</div><div class="lbl">Mission 1</div></div>
        <div class="stat"><div class="num">${s.m2}</div><div class="lbl">Mission 2</div></div>
        <div class="stat"><div class="num">${s.m3}</div><div class="lbl">Mission 3</div></div>
        <div class="stat"><div class="num">${s.cert}</div><div class="lbl">Cert Issued</div></div>
        <div class="stat"><div class="num">${s.galleryPosts||0}</div><div class="lbl">Gallery Posts</div></div>
      </div>
      <div class="refresh-hint">อัปเดตอัตโนมัติทุก 6 วินาที</div>
    </div>
    <div class="card">
      <h2>ควบคุมกิจกรรม (กดปลดล็อกให้ทุกคนพร้อมกัน)</h2>
      ${STAGES.map(st=>{ const open=s[STAGE_CFGKEY[st.key]];
        return `<div class="stage-row"><div><div class="stage-name">${st.label} <span class="badge ${open?'open':'closed'}">${open?'OPEN':'CLOSED'}</span></div></div>
          <button class="toggle-btn" data-key="${st.key}" data-open="${open?'0':'1'}">${open?'ปิด':'ปลดล็อก'}</button></div>`; }).join('')}
    </div>
    <div class="card">
      <h2>ค้นหา / แก้ไขผู้เข้าร่วม</h2>
      <div class="search-row"><input type="text" id="searchInput" placeholder="ค้นหาด้วยชื่อ / เลข No / ทีม" value="${lastQuery.replace(/"/g,'&quot;')}"><button id="searchBtn">ค้นหา</button></div>
      <div id="searchResults"></div>
    </div>
    ${backLink()}`;
  document.querySelectorAll('.toggle-btn').forEach(btn=>{ btn.onclick=async ()=>{ btn.disabled=true;
    await callApi('adminSetOpen',{password:PASSWORD, key:btn.dataset.key, open:btn.dataset.open==='1'}); screenDashboard(); }; });
  document.getElementById('searchBtn').onclick=doSearch;
  document.getElementById('searchInput').addEventListener('keydown',e=>{ if(e.key==='Enter') doSearch(); });
  if(lastQuery&&searchCache.length) renderSearch();
  clearInterval(pollTimer); pollTimer=setInterval(screenDashboard,6000);
}
async function doSearch(){ lastQuery=document.getElementById('searchInput').value.trim();
  const res=await callApi('adminSearchParticipants',{password:PASSWORD, query:lastQuery}); if(!res.success) return; searchCache=res.items; renderSearch(); }
function renderSearch(){
  const box=document.getElementById('searchResults'); if(!box) return;
  if(!searchCache.length){ box.innerHTML='<p class="refresh-hint" style="text-align:left;">ไม่พบผู้เข้าร่วม</p>'; return; }
  const flags=[['checkin','เช็คอิน'],['openchat','OpenChat'],['m1','M1'],['m2','M2'],['m3','M3'],['cert','Cert']];
  box.innerHTML=searchCache.map(p=>`
    <div class="p-row" data-id="${p.attendeeId}">
      <div class="p-head"><div><div class="p-name">${p.name} <span style="font-weight:400;color:var(--muted)">(${p.nick||''})</span></div>
        <div class="p-id">No ${p.attendeeId} · ${p.runNo||''} · ${p.team||''}</div></div></div>
      <div class="p-flags">${flags.map(f=>`<button class="flag-btn ${p[f[0]]?'on':''}" data-field="${f[0]}">${f[1]}</button>`).join('')}</div>
    </div>`).join('');
  box.querySelectorAll('.p-row').forEach(row=>{ const id=row.dataset.id;
    row.querySelectorAll('.flag-btn').forEach(btn=>{ btn.onclick=async ()=>{ const field=btn.dataset.field; const nv=!btn.classList.contains('on');
      btn.disabled=true; const patch={}; patch[field]=nv; await callApi('adminUpdateParticipant',{password:PASSWORD, attendeeId:id, patch});
      btn.classList.toggle('on',nv); btn.disabled=false; }; }); });
}
screenLogin();
</script>
</body>
</html>
