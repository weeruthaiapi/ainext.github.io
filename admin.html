<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI NEXT — Staff Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --white:#FFFFFF; --black:#000000;
    --maroon:#5A0006; --red-dark:#920004; --red:#D92000; --orange-red:#F3500A; --orange:#F37100;
    --grad: linear-gradient(90deg, var(--maroon), var(--red-dark), var(--red), var(--orange-red), var(--orange));
  }
  *{box-sizing:border-box;}
  body{ margin:0; min-height:100vh; color:var(--white); font-family:'Prompt',sans-serif;
    background: radial-gradient(circle at 50% -10%, #2a0002 0%, var(--black) 55%); }
  .header{ background:var(--grad); padding:18px 20px; text-align:center; }
  .header h1{ font-family:'Orbitron',sans-serif; margin:0; font-size:20px; }
  .wrap{ max-width:680px; margin:0 auto; padding:24px 18px 60px; }
  .card{ background:linear-gradient(160deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
    border:1px solid rgba(243,113,0,.35); border-radius:16px; padding:22px 20px; margin-bottom:16px; }
  h2{ font-family:'Orbitron',sans-serif; font-size:15px; color:var(--orange); margin-top:0; }
  input[type=password], input[type=text]{ width:100%; padding:12px 14px; border-radius:10px; border:1px solid rgba(255,255,255,.2);
    background:rgba(0,0,0,.35); color:var(--white); font-size:15px; margin-bottom:12px; }
  button{ cursor:pointer; background:var(--grad); color:var(--white); border:none; border-radius:10px;
    padding:12px 16px; font-family:'Prompt',sans-serif; font-weight:600; font-size:14px; }
  button.small{ padding:8px 12px; font-size:12px; }
  button:disabled{ opacity:.5; }
  .error{ color:#ff8a7a; background:rgba(146,0,4,.3); border:1px solid var(--red); padding:10px 12px; border-radius:10px; font-size:13px; margin-bottom:12px;}
  .stage-row{ display:flex; align-items:center; justify-content:space-between; padding:14px 0; border-bottom:1px solid rgba(255,255,255,.08); }
  .stage-row:last-child{ border-bottom:none; }
  .stage-name{ font-weight:600; font-size:14px; }
  .badge{ font-size:11px; padding:4px 10px; border-radius:20px; margin-left:8px; }
  .badge.open{ background:rgba(243,113,0,.25); color:var(--orange); border:1px solid var(--orange); }
  .badge.closed{ background:rgba(255,255,255,.08); color:rgba(255,255,255,.5); border:1px solid rgba(255,255,255,.2); }
  .toggle-btn{ min-width:100px; }
  .stats-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; text-align:center; }
  .stat{ background:rgba(0,0,0,.3); border-radius:12px; padding:14px 6px; }
  .stat .num{ font-family:'Orbitron',sans-serif; font-size:22px; color:var(--orange); }
  .stat .lbl{ font-size:11px; opacity:.75; margin-top:4px;}
  .refresh-hint{ text-align:center; font-size:11px; opacity:.6; margin-top:6px;}
  .q-row{ display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 0; border-bottom:1px solid rgba(255,255,255,.08); }
  .q-text{ font-size:13px; flex:1; }
  .q-add-row{ display:flex; gap:8px; }
  .q-add-row input{ margin-bottom:0; }
  .q-add-row button{ width:auto; white-space:nowrap; }
  .p-row{ border:1px solid rgba(255,255,255,.1); border-radius:12px; padding:12px 14px; margin-bottom:10px; }
  .p-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .p-name{ font-weight:600; font-size:14px; }
  .p-id{ font-size:11px; opacity:.6; }
  .p-flags{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:8px; }
  .flag-btn{ width:auto; font-size:11px; padding:6px 10px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.2); }
  .flag-btn.on{ background:var(--grad); border-color:transparent; }
  .p-team-row{ display:flex; gap:8px; }
  .p-team-row input{ margin-bottom:0; }
  .search-row{ display:flex; gap:8px; }
  .search-row input{ margin-bottom:0; }
  .search-row button{ width:auto; white-space:nowrap; }
</style>
</head>
<body>
<div class="header"><h1>🛠 AI NEXT — Staff Admin</h1></div>
<div class="wrap" id="app"></div>

<script>
const DEMO_MODE = false;
const API_BASE_URL = "https://script.google.com/macros/s/AKfycbxlGc6JxljLQgNQlaWhFTuUI4mXj8b-XTYrtpkX9DpYAA2Df7U734Uyqn7F6yc1S3jY/exec";

const LS_PARTICIPANTS='ainext_participants', LS_CONFIG='ainext_config', LS_GALLERY='ainext_gallery',
      LS_LIKES='ainext_likes', LS_COMMENTS='ainext_comments', LS_QUESTIONS='ainext_questions';

function seedDemo(){
  if(!localStorage.getItem(LS_PARTICIPANTS)){
    localStorage.setItem(LS_PARTICIPANTS, JSON.stringify([
      {AttendeeID:'A001', FirstName:'สมชาย', LastName:'ใจดี', Team:'Team Rocket AI', Confirmed:true, Stage1_Time:null, Stage2_Time:null, Stage2_Answer:'', Stage3_Time:null, Stage3_PhotoURL:'', Stage3_Note:'', CertIssued:false},
      {AttendeeID:'A002', FirstName:'Jane', LastName:'Doe', Team:'Neural Ninjas', Confirmed:true, Stage1_Time:null, Stage2_Time:null, Stage2_Answer:'', Stage3_Time:null, Stage3_PhotoURL:'', Stage3_Note:'', CertIssued:false},
      {AttendeeID:'A003', FirstName:'ไม่', LastName:'ยืนยัน', Team:'', Confirmed:false, Stage1_Time:null, Stage2_Time:null, Stage2_Answer:'', Stage3_Time:null, Stage3_PhotoURL:'', Stage3_Note:'', CertIssued:false}
    ]));
  }
  if(!localStorage.getItem(LS_CONFIG)){
    localStorage.setItem(LS_CONFIG, JSON.stringify({
      stage1_open:true, stage2_open:false, stage3_open:false, cert_open:false,
      admin_password:'ainext2026', event_name:'AI NEXT',
      cooldown_msg_1:'รอทีมงานเปิดกิจกรรมช่วงบ่าย...', cooldown_msg_2:'รอทีมงานเปิดกิจกรรม AI NEXT Challenge...',
      cooldown_msg_3:'รอทีมงานประกาศผล และปล่อย Certificate...'
    }));
  }
  if(!localStorage.getItem(LS_GALLERY)) localStorage.setItem(LS_GALLERY, JSON.stringify([]));
  if(!localStorage.getItem(LS_LIKES)) localStorage.setItem(LS_LIKES, JSON.stringify([]));
  if(!localStorage.getItem(LS_COMMENTS)) localStorage.setItem(LS_COMMENTS, JSON.stringify([]));
  if(!localStorage.getItem(LS_QUESTIONS)) localStorage.setItem(LS_QUESTIONS, JSON.stringify([]));
}
function readLS(k){ return JSON.parse(localStorage.getItem(k)||'null'); }
function writeLS(k,v){ localStorage.setItem(k, JSON.stringify(v)); }
function genId(){ return Math.random().toString(36).slice(2,10); }
function normalizeName(s){ return String(s||'').trim().toLowerCase().replace(/\s+/g,' '); }

function mockApi(action, params){
  seedDemo();
  return new Promise(resolve=>{
    setTimeout(()=>{
      const cfg = readLS(LS_CONFIG);
      let parts = readLS(LS_PARTICIPANTS);
      let gallery = readLS(LS_GALLERY);
      let questions = readLS(LS_QUESTIONS);
      const badPw = ()=> String(params.password)!==String(cfg.admin_password);

      if(action==='adminLogin') return resolve({success:String(params.password)===String(cfg.admin_password)});
      if(action==='adminUnlock'){
        if(badPw()) return resolve({success:false, reason:'bad_password'});
        const map={1:'stage1_open',2:'stage2_open',3:'stage3_open',4:'cert_open'};
        const key = map[params.stage]; if(!key) return resolve({success:false});
        cfg[key] = !!params.open;
        if(params.stage==4 && params.open){
          parts = parts.map(p=> (p.Stage3_Time && !p.CertIssued) ? {...p, CertIssued:true} : p);
          writeLS(LS_PARTICIPANTS, parts);
        }
        writeLS(LS_CONFIG, cfg);
        return resolve({success:true});
      }
      if(action==='adminStats'){
        if(badPw()) return resolve({success:false, reason:'bad_password'});
        const stats={total:parts.length, confirmed:0, stage1:0, stage2:0, stage3:0, cert:0,
          stage1_open:!!cfg.stage1_open, stage2_open:!!cfg.stage2_open, stage3_open:!!cfg.stage3_open, cert_open:!!cfg.cert_open,
          galleryPosts: gallery.length};
        parts.forEach(p=>{ if(p.Confirmed) stats.confirmed++; if(p.Stage1_Time) stats.stage1++; if(p.Stage2_Time) stats.stage2++; if(p.Stage3_Time) stats.stage3++; if(p.CertIssued) stats.cert++; });
        return resolve({success:true, stats});
      }
      if(action==='adminListQuestions'){
        if(badPw()) return resolve({success:false, reason:'bad_password'});
        return resolve({success:true, items:questions});
      }
      if(action==='adminAddQuestion'){
        if(badPw()) return resolve({success:false, reason:'bad_password'});
        const id = genId();
        questions.push({id, text:params.text, active:false});
        writeLS(LS_QUESTIONS, questions);
        return resolve({success:true, id});
      }
      if(action==='adminSetActiveQuestion'){
        if(badPw()) return resolve({success:false, reason:'bad_password'});
        questions = questions.map(q=>({...q, active: q.id===params.questionId}));
        writeLS(LS_QUESTIONS, questions);
        return resolve({success:true});
      }
      if(action==='adminSearchParticipants'){
        if(badPw()) return resolve({success:false, reason:'bad_password'});
        const q = normalizeName(params.query||'');
        let rows = parts;
        if(q) rows = rows.filter(p=>normalizeName(p.AttendeeID+' '+p.FirstName+' '+p.LastName+' '+p.Team).includes(q));
        const items = rows.slice(0,40).map(p=>({attendeeId:p.AttendeeID, firstName:p.FirstName, lastName:p.LastName,
          team:p.Team, confirmed:!!p.Confirmed, stage1:!!p.Stage1_Time, stage2:!!p.Stage2_Time, stage3:!!p.Stage3_Time, certIssued:!!p.CertIssued}));
        return resolve({success:true, items});
      }
      if(action==='adminUpdateParticipant'){
        if(badPw()) return resolve({success:false, reason:'bad_password'});
        const idx = parts.findIndex(p=>p.AttendeeID===params.attendeeId);
        if(idx<0) return resolve({success:false, reason:'not_found'});
        const patch = params.patch||{};
        if(typeof patch.confirmed==='boolean') parts[idx].Confirmed = patch.confirmed;
        if(typeof patch.team==='string') parts[idx].Team = patch.team;
        if(typeof patch.stage1==='boolean') parts[idx].Stage1_Time = patch.stage1 ? (parts[idx].Stage1_Time||new Date().toISOString()) : null;
        if(typeof patch.stage2==='boolean') parts[idx].Stage2_Time = patch.stage2 ? (parts[idx].Stage2_Time||new Date().toISOString()) : null;
        if(typeof patch.stage3==='boolean') parts[idx].Stage3_Time = patch.stage3 ? (parts[idx].Stage3_Time||new Date().toISOString()) : null;
        if(typeof patch.certIssued==='boolean') parts[idx].CertIssued = patch.certIssued;
        writeLS(LS_PARTICIPANTS, parts);
        return resolve({success:true});
      }
      resolve({success:false, error:'unknown_action'});
    }, 160);
  });
}
async function callApi(action, params={}){
  if(DEMO_MODE) return mockApi(action, params);
  const res = await fetch(API_BASE_URL, {method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body: JSON.stringify({action, ...params})});
  return res.json();
}

const app = document.getElementById('app');
let PASSWORD = null;
let pollTimer = null;

function screenLogin(err=''){
  app.innerHTML = `
    <div class="card">
      <h2>เข้าสู่ระบบทีมงาน</h2>
      ${err? `<div class="error">${err}</div>`:''}
      <input type="password" id="pw" placeholder="Admin password">
      <button id="loginBtn">เข้าสู่ระบบ</button>
    </div>`;
  document.getElementById('loginBtn').onclick = doLogin;
  document.getElementById('pw').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
}
async function doLogin(){
  const pw = document.getElementById('pw').value;
  const res = await callApi('adminLogin', {password: pw});
  if(!res.success){ screenLogin('รหัสผ่านไม่ถูกต้อง'); return; }
  PASSWORD = pw;
  screenDashboard();
}

const STAGES = [
  {n:1, key:'stage1_open', label:'Stage 1 · Morning Registration'},
  {n:2, key:'stage2_open', label:'Stage 2 · After-Lunch Question'},
  {n:3, key:'stage3_open', label:'Stage 3 · AI NEXT Challenge Selfie'},
  {n:4, key:'cert_open', label:'Stage 4 · Release Certificates'}
];

let questionsCache = [];
let searchResultsCache = [];
let lastSearchQuery = '';

async function screenDashboard(){
  const res = await callApi('adminStats', {password: PASSWORD});
  if(!res.success){ screenLogin('เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่'); return; }
  const s = res.stats;

  const qres = await callApi('adminListQuestions', {password: PASSWORD});
  questionsCache = qres.success ? qres.items : [];

  app.innerHTML = `
    <div class="card">
      <h2>ภาพรวม</h2>
      <div class="stats-grid">
        <div class="stat"><div class="num">${s.confirmed}/${s.total}</div><div class="lbl">Confirmed</div></div>
        <div class="stat"><div class="num">${s.stage1}</div><div class="lbl">Registered</div></div>
        <div class="stat"><div class="num">${s.stage2}</div><div class="lbl">Answered</div></div>
        <div class="stat"><div class="num">${s.stage3}</div><div class="lbl">Selfie</div></div>
        <div class="stat"><div class="num">${s.cert}</div><div class="lbl">Cert Issued</div></div>
        <div class="stat"><div class="num">${s.galleryPosts||0}</div><div class="lbl">Gallery Posts</div></div>
      </div>
      <div class="refresh-hint">อัปเดตอัตโนมัติทุก 6 วินาที</div>
    </div>

    <div class="card">
      <h2>ควบคุมด่าน (กดปลดล็อคให้ทุกคนพร้อมกัน)</h2>
      ${STAGES.map(st=>{
        const open = s[st.key];
        return `<div class="stage-row">
          <div><div class="stage-name">${st.label} <span class="badge ${open?'open':'closed'}">${open?'OPEN':'CLOSED'}</span></div></div>
          <button class="toggle-btn" data-stage="${st.n}" data-open="${open?'0':'1'}">${open?'ปิด':'ปลดล็อค'}</button>
        </div>`;
      }).join('')}
    </div>

    <div class="card">
      <h2>คำถามหมุนเวียน (Rotating Quiz)</h2>
      <div id="questionsList">
        ${questionsCache.length ? questionsCache.map(q=>`
          <div class="q-row">
            <div class="q-text">${q.active? '🟢 ':''}${q.text}</div>
            ${q.active? '' : `<button class="small" data-setactive="${q.id}">ตั้งเป็นคำถามปัจจุบัน</button>`}
          </div>
        `).join('') : '<p class="hint" style="text-align:left;">ยังไม่มีคำถาม เพิ่มด้านล่าง</p>'}
      </div>
      <div class="q-add-row" style="margin-top:12px;">
        <input type="text" id="newQuestionInput" placeholder="พิมพ์คำถามใหม่...">
        <button id="addQuestionBtn">เพิ่ม</button>
      </div>
    </div>

    <div class="card">
      <h2>ค้นหา / แก้ไขผู้เข้าร่วม</h2>
      <div class="search-row">
        <input type="text" id="searchInput" placeholder="ค้นหาด้วยชื่อ หรือ Attendee ID" value="${lastSearchQuery.replace(/"/g,'&quot;')}">
        <button id="searchBtn">ค้นหา</button>
      </div>
      <div id="searchResults"></div>
    </div>
  `;

  document.querySelectorAll('.toggle-btn').forEach(btn=>{
    btn.onclick = async ()=>{
      btn.disabled = true;
      await callApi('adminUnlock', {password: PASSWORD, stage: Number(btn.dataset.stage), open: btn.dataset.open==='1'});
      screenDashboard();
    };
  });

  document.getElementById('addQuestionBtn').onclick = async ()=>{
    const text = document.getElementById('newQuestionInput').value.trim();
    if(!text) return;
    const btn = document.getElementById('addQuestionBtn');
    btn.disabled = true;
    await callApi('adminAddQuestion', {password: PASSWORD, text});
    screenDashboard();
  };
  document.querySelectorAll('[data-setactive]').forEach(btn=>{
    btn.onclick = async ()=>{
      btn.disabled = true;
      await callApi('adminSetActiveQuestion', {password: PASSWORD, questionId: btn.dataset.setactive});
      screenDashboard();
    };
  });

  document.getElementById('searchBtn').onclick = doSearch;
  document.getElementById('searchInput').addEventListener('keydown', e=>{ if(e.key==='Enter') doSearch(); });

  // restore previous search results after a background refresh, without forcing a re-query
  if(lastSearchQuery && searchResultsCache.length){ renderSearchResults(); }

  clearInterval(pollTimer);
  pollTimer = setInterval(screenDashboard, 6000);
}

async function doSearch(){
  const query = document.getElementById('searchInput').value.trim();
  lastSearchQuery = query;
  const res = await callApi('adminSearchParticipants', {password: PASSWORD, query});
  if(!res.success){ return; }
  searchResultsCache = res.items;
  renderSearchResults();
}

function renderSearchResults(){
  const box = document.getElementById('searchResults');
  if(!box) return;
  if(!searchResultsCache.length){ box.innerHTML = '<p class="hint" style="text-align:left;">ไม่พบผู้เข้าร่วม</p>'; return; }
  box.innerHTML = searchResultsCache.map(p => `
    <div class="p-row" data-id="${p.attendeeId}">
      <div class="p-head">
        <div>
          <div class="p-name">${p.firstName} ${p.lastName}</div>
          <div class="p-id">${p.attendeeId}</div>
        </div>
      </div>
      <div class="p-flags">
        <button class="flag-btn ${p.confirmed?'on':''}" data-field="confirmed">Confirmed</button>
        <button class="flag-btn ${p.stage1?'on':''}" data-field="stage1">Stage 1</button>
        <button class="flag-btn ${p.stage2?'on':''}" data-field="stage2">Stage 2</button>
        <button class="flag-btn ${p.stage3?'on':''}" data-field="stage3">Stage 3</button>
        <button class="flag-btn ${p.certIssued?'on':''}" data-field="certIssued">Cert Issued</button>
      </div>
      <div class="p-team-row">
        <input type="text" value="${p.team||''}" data-team-input placeholder="ชื่อทีม">
        <button class="small" data-save-team>บันทึกทีม</button>
      </div>
    </div>
  `).join('');

  box.querySelectorAll('.p-row').forEach(row=>{
    const attendeeId = row.dataset.id;
    row.querySelectorAll('.flag-btn').forEach(btn=>{
      btn.onclick = async ()=>{
        const field = btn.dataset.field;
        const newVal = !btn.classList.contains('on');
        btn.disabled = true;
        const patch = {}; patch[field] = newVal;
        await callApi('adminUpdateParticipant', {password: PASSWORD, attendeeId, patch});
        btn.classList.toggle('on', newVal);
        btn.disabled = false;
      };
    });
    row.querySelector('[data-save-team]').onclick = async ()=>{
      const team = row.querySelector('[data-team-input]').value.trim();
      const btn = row.querySelector('[data-save-team]');
      btn.disabled = true; btn.textContent = '...';
      await callApi('adminUpdateParticipant', {password: PASSWORD, attendeeId, patch:{team}});
      btn.disabled = false; btn.textContent = 'บันทึกทีม';
    };
  });
}

seedDemo();
screenLogin();
</script>
</body>
</html>
