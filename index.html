<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">

<style>
  /* ===== Solar CI (คงจาก Project: Event Registration Website) ===== */
  :root{
    --accent:#fff; --accent-soft:rgba(255,255,255,.18); --glow:rgba(255,120,40,.55);
    --surface:rgba(20,0,2,.30); --surface-brd:rgba(255,255,255,.32); --line:rgba(255,255,255,.26);
    --muted:rgba(255,236,227,.85); --chip:rgba(0,0,0,.26); --bar:rgba(90,10,4,.35); --grid:rgba(255,255,255,.06);
    --dial:#8a1204; --text:#fff; --cta-bg:#fff; --cta-text:#b3160a;
    --ok:#4CD98B; --err:#ff9a90; --line-green:#06C755;
    --cert-bg:linear-gradient(150deg,#F37100,#8a1204); --cert-text:#fff; --cert-muted:rgba(255,236,227,.82); --cert-line:rgba(255,255,255,.35);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{ height:100%; }
  body{
    margin:0; min-height:100vh; color:var(--text); font-family:'IBM Plex Sans Thai',sans-serif;
    background: linear-gradient(158deg,#F37100 0%,#D92000 48%,#5A0006 100%);
    background-attachment: fixed;
  }
  .app{ position:relative; max-width:480px; margin:0 auto; min-height:100vh; overflow:hidden; }
  .grid-overlay{ position:absolute; inset:0; pointer-events:none;
    background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
    background-size:34px 34px; }
  .blob-tr{ position:absolute; top:-90px; right:-70px; width:260px; height:260px; border-radius:50%;
    background:radial-gradient(circle,var(--glow),transparent 68%); filter:blur(6px); pointer-events:none; }
  .blob-bl{ position:absolute; bottom:-120px; left:-80px; width:300px; height:300px; border-radius:50%;
    background:radial-gradient(circle,var(--glow),transparent 70%); opacity:.5; pointer-events:none; }
  .content{ position:relative; z-index:2; min-height:100vh; display:flex; flex-direction:column; }

  .appbar{ flex-shrink:0; display:none; align-items:center; justify-content:space-between; padding:16px 20px;
    border-bottom:1px solid var(--surface-brd); background:var(--bar); }
  .appbar.show{ display:flex; }
  .appbar .brand{ font-family:'Chakra Petch'; font-weight:700; font-size:15px; letter-spacing:1px; display:flex; align-items:center; }
  .appbar .brand img{ height:24px; width:auto; display:block; }
  .appbar .cert-chip{ display:inline-flex; align-items:center; gap:7px; background:var(--chip); border:1px solid var(--surface-brd);

  .screen-wrap{ flex:1; overflow-y:auto; padding:26px 22px 30px; }

  @keyframes anx-float{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }
  @keyframes anx-spin{ to{transform:rotate(360deg);} }
  @keyframes anx-blink{ 0%,100%{opacity:.25;} 50%{opacity:1;} }
  @keyframes anx-shine{ 0%{background-position:-160% 0;} 100%{background-position:260% 0;} }
  @keyframes anx-fab{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);} }
  @keyframes anx-fade{ 0%{opacity:0;} 100%{opacity:1;} }
  @keyframes anx-breathe{ 0%,100%{transform:scale(1);opacity:.45;} 50%{transform:scale(1.14);opacity:.8;} }
  @keyframes anx-pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,.4);}50%{box-shadow:0 0 0 12px rgba(255,255,255,0);}}

  .line-btn{ display:inline-flex; align-items:center; justify-content:center; gap:9px; width:100%; padding:15px 20px; border:none;

  .ghost-btn{ width:100%; padding:14px; border-radius:13px; background:transparent; border:1px solid var(--surface-brd);

  .back-btn{ align-self:flex-start; display:inline-flex; align-items:center; gap:6px; background:transparent; border:none;

  .dial-ring{ position:absolute; inset:0; border-radius:50%; border:4px solid transparent; border-top-color:var(--accent);

  .stat-box .val{ font-family:'Chakra Petch'; font-weight:600; font-size:14px; color:var(--text); }

  .progress-track{ height:9px; border-radius:999px; background:var(--line); overflow:hidden; }
  .progress-fill{ height:100%; border-radius:999px; background:var(--cta-bg); transition:width .5s ease; }

  .task-card{ display:flex; align-items:center; gap:13px; width:100%; text-align:left; padding:14px; border-radius:14px;

  .task-card.done{ border-color:var(--accent); }
  .task-card .icon{ width:38px; height:38px; border-radius:11px; flex-shrink:0; display:flex; align-items:center; justify-content:center;

  .task-card.done .icon{ color:var(--cta-text); background:var(--cta-bg); }
  .task-card .ttitle{ font-family:'Chakra Petch'; font-weight:600; font-size:15px; color:var(--text); }
  .task-card .tsub{ font-size:11.5px; color:var(--muted); }
  .task-card .badge{ font-family:'Chakra Petch'; font-size:11px; padding:5px 10px; border-radius:999px; flex-shrink:0;
    border:1px solid var(--surface-brd); color:var(--text); }

  .checklist-item{ display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--surface-brd);
    border-radius:12px; padding:11px 13px; }
  .checklist-item .dot{ width:22px; height:22px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center;
    color:var(--cta-text); background:var(--line); }
  .checklist-item .dot.on{ background:var(--cta-bg); }

  /* mission form controls (จาก AI NEXT Mission Passport) */
  label.q{ display:block; font-size:14px; font-weight:600; margin:18px 0 8px; color:var(--text); line-height:1.5; }
  .scale{ display:flex; gap:8px; }
  .scale button{ flex:1; padding:12px 0; border-radius:11px; border:1px solid var(--surface-brd); background:var(--chip);
    color:var(--muted); font-size:16px; font-weight:700; cursor:pointer; font-family:'Chakra Petch'; }
  .scale button.sel{ background:var(--cta-bg); color:var(--cta-text); border-color:transparent; }
  .scale.ten{ flex-wrap:wrap; }
  .scale.ten button{ flex:0 0 calc(20% - 7px); }
  .seg{ display:flex; gap:8px; }
  .seg.col{ flex-direction:column; }
  .seg button{ flex:1; padding:12px; border-radius:11px; border:1px solid var(--surface-brd); background:var(--chip);
    color:var(--muted); font-weight:600; font-size:13.5px; cursor:pointer; font-family:'IBM Plex Sans Thai'; text-align:left; }
  .seg:not(.col) button{ text-align:center; }
  .seg button.sel{ background:var(--cta-bg); color:var(--cta-text); border-color:transparent; }

  .cert-card{ position:relative; border-radius:18px; overflow:hidden; padding:26px 22px; background:var(--cert-bg);

  .cert-shine{ position:absolute; inset:0; background:linear-gradient(115deg,transparent 30%,rgba(255,255,255,.14) 50%,transparent 70%);

  .cert-card .brand{ font-family:'Chakra Petch'; font-size:10px; letter-spacing:3px; color:var(--cert-muted); text-transform:uppercase; }
  .cert-card .cname{ font-family:'Chakra Petch'; font-weight:600; font-size:26px; color:var(--cert-text); margin:8px 0 2px; }
  .cert-card .cdesc{ font-size:12px; color:var(--cert-muted); margin-bottom:18px; }
  .cert-foot{ display:flex; justify-content:space-between; align-items:flex-end; border-top:1px solid var(--cert-line); padding-top:14px; }
  .cert-foot .l{ font-size:10px; color:var(--cert-muted); }
  .cert-foot .v{ font-family:'Chakra Petch'; font-weight:600; font-size:13px; color:var(--cert-text); }

  /* Gallery FAB + overlay (คงจาก Event Reg) */
  .gallery-fab{ position:fixed; right:16px; bottom:22px; z-index:20; width:58px; height:58px; border-radius:50%;

    box-shadow:0 10px 28px var(--glow), inset 0 1px 6px rgba(255,255,255,.5); cursor:pointer; display:flex; align-items:center;
    justify-content:center; color:#fff; animation:anx-fab 4s ease-in-out infinite; }
  .gallery-fab .badge-count{ position:absolute; top:-4px; right:-4px; min-width:20px; height:20px; padding:0 5px; border-radius:999px;

  .gallery-overlay{ position:fixed; inset:0; z-index:30; display:flex; flex-direction:column; overflow:hidden; animation:anx-fade .3s ease both;

  .gallery-head{ position:relative; z-index:2; display:flex; align-items:center; justify-content:space-between; padding:20px 20px 14px; }
  .gallery-head h2{ margin:0; font-family:'Chakra Petch'; font-weight:600; font-size:20px; color:#fff; }
  .gallery-head p{ margin:1px 0 0; font-size:11px; letter-spacing:1px; color:rgba(255,255,255,.7); }
  .gallery-close{ width:38px; height:38px; border-radius:50%; background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.24);
    color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .gallery-feed{ position:relative; z-index:2; flex:1; overflow-y:auto; padding:4px 16px 26px; display:flex; flex-direction:column; gap:16px; max-width:480px; margin:0 auto; width:100%; }
  .gal-card{ position:relative; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.18); border-radius:20px;
    padding:14px; backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); }
  .gal-card.composer{ background:rgba(255,255,255,.1); border-color:rgba(255,255,255,.26); }

<script>

/* DEMO_MODE=true -> ใช้ข้อมูลจำลองในเครื่อง (เปิดไฟล์ดูได้เลย)

const API_BASE_URL = "https://script.google.com/macros/s/AKfycbwBjLK0dyM7RsVtwoPoPCVuCA9GngcXbJXVlLlDjIzJIUaq5_zXOneEdFDDNaAuK8WZAg/exec";

/* ================= DEMO MOCK BACKEND ================= */
const LS_ROSTER='ainext_m_roster', LS_CONFIG='ainext_m_config', LS_GALLERY='ainext_m_gallery',

function seedDemo(){

      const cfg = readLS(LS_CONFIG); let roster = readLS(LS_ROSTER);
      let gallery = readLS(LS_GALLERY), likes = readLS(LS_LIKES), comments = readLS(LS_COMMENTS);
      const find = id => roster.find(p=>String(p.no)===String(id));
      const statusOf = p => ({ success:true, event_name:cfg.event_name, attendeeId:p.no, runNo:p.runNo, team:p.team, nick:p.nick, menu:p.menu,
        joinedOpenChat:!!p.joinedOpenChat, checkedIn:!!p.checkedIn, openchatUrl:cfg.openchat_url, stage:stageOf(p),
        done:{m1:!!p.m1,m2:!!p.m2,m3:!!p.m3}, certIssued:!!p.cert,
        mission1_open:!!cfg.mission1_open, mission2_open:!!cfg.mission2_open, mission3_open:!!cfg.mission3_open, cert_open:!!cfg.cert_open });

      if(action==='checkin'){
        const nm = normalizeName(params.name);
        if(!nm) return resolve({success:false, reason:'empty_name'});
        if(!cfg.checkin_open) return resolve({success:false, reason:'checkin_closed'});
        let p = roster.find(x=>normalizeName(x.name)===nm) || roster.find(x=>normalizeName(x.name).includes(nm));
        if(!p) return resolve({success:false, reason:'not_found'});
        const parts = p.name.split(' ');
        return resolve(Object.assign(statusOf(p), {firstName:parts[0], lastName:parts.slice(1).join(' ')}));
      }
      if(action==='confirmCheckin'){
        if(!params.pdpa) return resolve({success:false, reason:'need_pdpa'});
        const p = find(params.attendeeId); if(!p) return resolve({success:false, reason:'not_found'});
        if(params.joinedOpenChat) p.joinedOpenChat = true;
        p.checkedIn = true; writeLS(LS_ROSTER, roster);
        return resolve(statusOf(p));
      }
      if(action==='getStatus'){ const p = find(params.attendeeId); if(!p) return resolve({success:false}); return resolve(statusOf(p)); }
      if(action==='submitMission'){
        const p = find(params.attendeeId); if(!p) return resolve({success:false});
        const key = 'mission'+params.mission+'_open'; if(!cfg[key]) return resolve({success:false, reason:'mission_closed'});
        if(!p.checkedIn) return resolve({success:false, reason:'not_checked_in'});
        p['m'+params.mission]=true; writeLS(LS_ROSTER, roster);
        return resolve(statusOf(p));
      }
      if(action==='getGallery'){
        const items = gallery.slice().reverse().map(g=>({...g,
          likedByMe: params.attendeeId? likes.some(l=>l.postId===g.postId&&String(l.no)===String(params.attendeeId)):false,
          commentCount: comments.filter(c=>c.postId===g.postId).length }));
        return resolve({success:true, items});
      }
      if(action==='uploadGalleryPost'||action==='submitSelfie'){
        const p = find(params.attendeeId); if(!p) return resolve({success:false});
        const postId = genId();
        const photoUrl = params.imageBase64 ? ('data:'+(params.mimeType||'image/jpeg')+';base64,'+params.imageBase64) : '';
        gallery.push({postId, timestamp:new Date().toISOString(), name:p.name, team:params.team||p.team, note:params.note||'', photoUrl, likes:0});
        writeLS(LS_GALLERY, gallery); return resolve({success:true, postId, photoUrl});
      }
      if(action==='likePost'){
        const gi = gallery.findIndex(g=>g.postId===params.postId); if(gi<0) return resolve({success:false});
        const li = likes.findIndex(l=>l.postId===params.postId&&String(l.no)===String(params.attendeeId)); let liked;
        if(li>=0){ likes.splice(li,1); gallery[gi].likes=Math.max(0,(gallery[gi].likes||0)-1); liked=false; }
        else { likes.push({postId:params.postId, no:params.attendeeId}); gallery[gi].likes=(gallery[gi].likes||0)+1; liked=true; }
        writeLS(LS_LIKES,likes); writeLS(LS_GALLERY,gallery); return resolve({success:true, liked, likes:gallery[gi].likes});
      }
      if(action==='getComments') return resolve({success:true, items:comments.filter(c=>c.postId===params.postId)});
      if(action==='addComment'){
        const p = find(params.attendeeId); if(!p) return resolve({success:false});
        const c={postId:params.postId, name:p.name, comment:params.comment, timestamp:new Date().toISOString()};
        comments.push(c); writeLS(LS_COMMENTS,comments); return resolve({success:true, comment:c});
      }
      resolve({success:false, error:'unknown_action'});
    }, 160);
  });
}
async function callApi(action, params={}){
  if(DEMO_MODE) return mockApi(action, params);
  const res = await fetch(API_BASE_URL, { method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body: JSON.stringify({action, ...params}) });
  return res.json();
}

let curMission=0, answers={};
function openMission(n){
  stopAllPolls();
  curMission=n; answers={};
  const f=FORMS[n], meta=M_META[n-1];
  let h='';
  f.items.forEach((it,idx)=>{
    h+=`<label class="q">${idx+1}. ${esc(it.q)}</label>`;
    if(it.t==='text') h+=`<textarea class="field" data-k="${it.k}" oninput="answers[this.dataset.k]=this.value"></textarea>`;
    if(it.t==='scale5'||it.t==='scale10'){ const max=it.t==='scale5'?5:10;
      h+=`<div class="scale${max===10?' ten':''}">`;
      for(let i=1;i<=max;i++) h+=`<button type="button" onclick="pickScale(this,'${it.k}',${i})">${i}</button>`;
      h+=`</div>`;
    }
    if(it.t==='seg'||it.t==='segcol'){ h+=`<div class="seg${it.t==='segcol'?' col':''}">`;
      it.opts.forEach(o=>{ h+=`<button type="button" onclick="pickSeg(this,'${it.k}')">${esc(o)}</button>`; });
      h+=`</div>`;
    }
  });
  shell(`
    <div class="screen">

      <div id="mErr"></div>
      <button class="cta-btn" id="mSubmit">ส่งคำตอบ · รับแสตมป์ 🎖</button>
    </div>
  `, true);

  document.getElementById('mSubmit').onclick=submitMission;

}
function pickScale(btn,k,v){ answers[k]=v; markSel(btn); }
function pickSeg(btn,k){ answers[k]=btn.textContent; markSel(btn); }
function markSel(btn){ Array.prototype.forEach.call(btn.parentNode.children,b=>b.classList.remove('sel')); btn.classList.add('sel'); }
async function submitMission(){
  const f=FORMS[curMission], missing=[];
  f.items.forEach((it,idx)=>{ const v=answers[it.k]; if(v===undefined||String(v).trim()===''){ missing.push(idx+1); } });
  if(missing.length){ document.getElementById('mErr').innerHTML=`<p class="error-msg">ยังไม่ได้ตอบข้อ: ${missing.join(', ')}</p>`; return; }
  const btn=document.getElementById('mSubmit'); btn.disabled=true; btn.textContent='กำลังส่ง…';
  const p=getProfile();
  const res=await callApi('submitMission', {attendeeId:p.attendeeId, mission:curMission, answers});
  if(!res.success){ document.getElementById('mErr').innerHTML='<p class="error-msg">ส่งไม่สำเร็จ ลองอีกครั้ง</p>'; btn.disabled=false; btn.textContent='ส่งคำตอบ · รับแสตมป์ 🎖'; return; }
  latestStatus=res;
  if(res.done&&res.done.m1&&res.done.m2&&res.done.m3){ screen='cert'; screenCert(); }
  else { screen='hub'; screenHub(); }
}

async function loadComments(postId){
  let slot=document.querySelector(`[data-cslot="${postId}"]`); if(!slot||!slot.isConnected) return;
  slot.innerHTML='<div class="gal-comments"><span style="font-size:11px;opacity:.7">กำลังโหลด...</span></div>';
  const res=await callApi('getComments',{postId}); slot=document.querySelector(`[data-cslot="${postId}"]`); if(!slot||!slot.isConnected) return;
  const p=getProfile(); const items=res.success?res.items:[];
  slot.innerHTML=`<div class="gal-comments">
    ${items.map(c=>`<div class="gal-comment-item"><div class="gal-comment-avatar">${esc((c.name||'?')[0])}</div><div class="gal-comment-text"><b style="color:#fff">${esc(c.name)}</b> ${esc(c.comment)}</div></div>`).join('')}
    ${p?`<div class="gal-comment-row"><input class="gal-comment-field" id="cf-${postId}" placeholder="เพิ่มความคิดเห็น…"><button class="gal-comment-send" id="cs-${postId}">ส่ง</button></div>`:`<div class="gal-login-nudge">เช็คอินก่อน เพื่อคอมเมนต์</div>`}
  </div>`;
  if(p){ const send=async ()=>{ const field=document.getElementById(`cf-${postId}`); if(!field) return; const text=field.value.trim(); if(!text) return;
      const r=await callApi('addComment',{attendeeId:p.attendeeId, postId, comment:text});
      if(r.success){ const it=galleryItemsCache.find(g=>g.postId===postId); if(it) it.commentCount=(it.commentCount||0)+1; if(field.isConnected) field.value=''; loadComments(postId); } };
    const sb=document.getElementById(`cs-${postId}`); const fe=document.getElementById(`cf-${postId}`); if(sb) sb.onclick=send; if(fe) fe.addEventListener('keydown',e=>{ if(e.key==='Enter') send(); }); }
}

/* ================= INIT ================= */
(function init(){
  seedDemo();
  const p=getProfile();
  if(p){ screen='hub'; screenHub(); } else { screen='landing'; screenLanding(); }
})();
</script>
