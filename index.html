<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI NEXT — Registration</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=IBM+Plex+Sans+Thai:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{
    --accent:#fff; --accent-soft:rgba(255,255,255,.18); --glow:rgba(255,120,40,.55);
    --surface:rgba(20,0,2,.30); --surface-brd:rgba(255,255,255,.32); --line:rgba(255,255,255,.26);
    --muted:rgba(255,236,227,.85); --chip:rgba(0,0,0,.26); --bar:rgba(90,10,4,.35); --grid:rgba(255,255,255,.06);
    --dial:#8a1204; --text:#fff; --cta-bg:#fff; --cta-text:#b3160a;
    --cert-bg:linear-gradient(150deg,#F37100,#8a1204); --cert-text:#fff; --cert-muted:rgba(255,236,227,.82); --cert-line:rgba(255,255,255,.35);
  }
  *{box-sizing:border-box;}
  html,body{ height:100%; }
  body{
    margin:0; min-height:100vh; color:var(--text); font-family:'IBM Plex Sans Thai',sans-serif;
    background: linear-gradient(158deg,#F37100 0%,#D92000 48%,#5A0006 100%);
    background-attachment: fixed;
  }
  .app{ position:relative; max-width:480px; margin:0 auto; min-height:100vh; overflow:hidden; }
  .grid-overlay{ position:absolute; inset:0; pointer-events:none;
    background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
    background-size:34px 34px; }
  .blob-tr{ position:absolute; top:-90px; right:-70px; width:260px; height:260px; border-radius:50%;
    background:radial-gradient(circle,var(--glow),transparent 68%); filter:blur(6px); pointer-events:none; }
  .blob-bl{ position:absolute; bottom:-120px; left:-80px; width:300px; height:300px; border-radius:50%;
    background:radial-gradient(circle,var(--glow),transparent 70%); opacity:.5; pointer-events:none; }
  .content{ position:relative; z-index:2; min-height:100vh; display:flex; flex-direction:column; }

  .appbar{ flex-shrink:0; display:none; align-items:center; justify-content:space-between; padding:16px 20px;
    border-bottom:1px solid var(--surface-brd); background:var(--bar); }
  .appbar.show{ display:flex; }
  .appbar .brand{ font-family:'Chakra Petch'; font-weight:700; font-size:15px; letter-spacing:1px; display:flex; align-items:center; }
  .appbar .brand img{ height:24px; width:auto; display:block; }
  .appbar .cert-chip{ display:inline-flex; align-items:center; gap:7px; background:var(--chip); border:1px solid var(--surface-brd);
    border-radius:999px; padding:6px 12px; cursor:pointer; color:var(--text); border-width:1px; font-family:'Chakra Petch'; font-weight:600; font-size:12px; letter-spacing:1px; }

  .screen-wrap{ flex:1; overflow-y:auto; padding:26px 22px 30px; }
  .screen{ min-height:100%; display:flex; flex-direction:column; animation:anx-rise .45s ease both; }
  @keyframes anx-rise{ 0%{opacity:0; transform:translateY(16px);} 100%{opacity:1; transform:translateY(0);} }
  @keyframes anx-float{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }
  @keyframes anx-spin{ to{transform:rotate(360deg);} }
  @keyframes anx-blink{ 0%,100%{opacity:.25;} 50%{opacity:1;} }
  @keyframes anx-shine{ 0%{background-position:-160% 0;} 100%{background-position:260% 0;} }
  @keyframes anx-fab{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);} }
  @keyframes anx-fade{ 0%{opacity:0;} 100%{opacity:1;} }
  @keyframes anx-breathe{ 0%,100%{transform:scale(1);opacity:.45;} 50%{transform:scale(1.14);opacity:.8;} }
  @keyframes anx-bub{ 0%{transform:translateY(20px) scale(.85);opacity:0;} 18%{opacity:.6;} 100%{transform:translateY(-140px) scale(1.2);opacity:0;} }

  .kicker{ display:flex; align-items:center; gap:8px; font-family:'Chakra Petch'; font-size:11px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; }
  .kicker .bar{ width:20px; height:2px; background:var(--accent); display:inline-block; }
  h1.title{ margin:16px 0 4px; font-family:'Chakra Petch'; font-weight:600; font-size:23px; color:var(--text); }
  h2.title{ margin:0 0 4px; font-family:'Chakra Petch'; font-weight:600; font-size:24px; color:var(--text); }
  .subtitle{ margin:0; font-family:'Chakra Petch'; font-size:12px; letter-spacing:3px; color:var(--accent); text-transform:uppercase; }
  .desc{ margin:14px 0 0; font-size:13.5px; line-height:1.6; color:var(--muted); }

  .session-row{ display:flex; align-items:center; gap:12px; background:var(--surface); border:1px solid var(--surface-brd);
    border-radius:13px; padding:12px 14px; }
  .session-row .time{ font-family:'Chakra Petch'; font-weight:600; font-size:13px; color:var(--accent); width:54px; flex-shrink:0; }
  .session-row .stitle{ font-family:'Chakra Petch'; font-weight:600; font-size:14px; color:var(--text); }
  .session-row .ssub{ font-size:11.5px; color:var(--muted); }

  .cta-btn, .ghost-btn, .back-btn{ font-family:'Chakra Petch'; cursor:pointer; }
  .cta-btn{ display:inline-flex; align-items:center; justify-content:center; gap:9px; width:100%; padding:16px 20px; border:none;
    border-radius:14px; background:var(--cta-bg); color:var(--cta-text); font-weight:600; font-size:15px; letter-spacing:.4px;
    box-shadow:0 12px 30px var(--glow); transition:transform .16s ease; margin-top:14px; }
  .cta-btn:hover{ transform:translateY(-2px); }
  .cta-btn:disabled{ opacity:.6; cursor:not-allowed; transform:none; }
  .ghost-btn{ width:100%; padding:14px; border-radius:13px; background:transparent; border:1px solid var(--surface-brd);
    color:var(--text); font-weight:500; font-size:13.5px; margin-top:10px; }
  .back-btn{ align-self:flex-start; display:inline-flex; align-items:center; gap:6px; background:transparent; border:none;
    color:var(--muted); font-size:13px; padding:0; margin-bottom:20px; }
  .admin-link{ display:inline-flex; align-items:center; justify-content:center; gap:6px; background:transparent; border:none;
    color:var(--muted); font-family:'Chakra Petch'; font-size:12px; cursor:pointer; margin-top:14px; text-decoration:none; }

  .field{ width:100%; padding:16px 18px; border-radius:13px; background:var(--chip); border:1px solid var(--surface-brd);
    color:var(--text); font-family:'Chakra Petch'; font-size:16px; letter-spacing:.5px; outline:none; margin-bottom:0; }
  .field:focus{ border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
  textarea.field{ font-family:'IBM Plex Sans Thai'; font-size:14px; min-height:90px; resize:vertical; letter-spacing:normal; }
  .error-msg{ margin:10px 0 0; color:#fff; background:rgba(0,0,0,.28); border:1px solid var(--surface-brd); border-radius:10px;
    padding:9px 12px; font-size:12.5px; display:flex; align-items:center; gap:6px; }

  .dial-wrap{ position:relative; width:170px; height:170px; border-radius:50%; margin:6px auto; display:flex; align-items:center; justify-content:center; }
  .dial-ring{ position:absolute; inset:0; border-radius:50%; border:4px solid transparent; border-top-color:var(--accent);
    border-right-color:var(--accent); animation:anx-spin 1.3s linear infinite; }
  .dial-inner{ position:absolute; inset:11px; border-radius:50%; background:var(--dial); display:flex; flex-direction:column;
    align-items:center; justify-content:center; border:1px solid var(--surface-brd); text-align:center; padding:10px; }

  .stat-box{ flex:1; background:var(--surface); border:1px solid var(--surface-brd); border-radius:13px; padding:13px; text-align:left; }
  .stat-box .lbl{ font-size:11px; color:var(--muted); }
  .stat-box .val{ font-family:'Chakra Petch'; font-weight:600; font-size:14px; color:var(--text); }

  .progress-card{ background:var(--surface); border:1px solid var(--surface-brd); border-radius:16px; padding:16px; margin-bottom:18px; }
  .progress-card .row{ display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .progress-track{ height:9px; border-radius:999px; background:var(--line); overflow:hidden; }
  .progress-fill{ height:100%; border-radius:999px; background:var(--cta-bg); transition:width .5s ease; }

  .task-card{ display:flex; align-items:center; gap:13px; width:100%; text-align:left; padding:14px; border-radius:14px;
    cursor:pointer; background:var(--surface); border:1px solid var(--surface-brd); font-family:inherit; color:inherit; }
  .task-card.done{ border-color:var(--accent); }
  .task-card .icon{ width:38px; height:38px; border-radius:11px; flex-shrink:0; display:flex; align-items:center; justify-content:center;
    font-family:'Chakra Petch'; color:var(--accent); background:var(--accent-soft); }
  .task-card.done .icon{ color:var(--cta-text); background:var(--cta-bg); }
  .task-card .ttitle{ font-family:'Chakra Petch'; font-weight:600; font-size:15px; color:var(--text); }
  .task-card .tsub{ font-size:11.5px; color:var(--muted); }
  .task-card .badge{ font-family:'Chakra Petch'; font-size:11px; padding:5px 10px; border-radius:999px; flex-shrink:0;
    border:1px solid var(--surface-brd); color:var(--text); }

  .checklist-item{ display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--surface-brd);
    border-radius:12px; padding:11px 13px; }
  .checklist-item .dot{ width:22px; height:22px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center;
    color:var(--cta-text); background:var(--line); }
  .checklist-item .dot.on{ background:var(--cta-bg); }

  .cert-card{ position:relative; border-radius:18px; overflow:hidden; padding:26px 22px; background:var(--cert-bg);
    border:1px solid var(--accent); box-shadow:0 20px 50px var(--glow); }
  .cert-shine{ position:absolute; inset:0; background:linear-gradient(115deg,transparent 30%,rgba(255,255,255,.14) 50%,transparent 70%);
    background-size:250% 100%; animation:anx-shine 3.5s linear infinite; pointer-events:none; }
  .cert-card .brand{ font-family:'Chakra Petch'; font-size:10px; letter-spacing:3px; color:var(--cert-muted); text-transform:uppercase; }
  .cert-card .cname{ font-family:'Chakra Petch'; font-weight:600; font-size:26px; color:var(--cert-text); margin:8px 0 2px; }
  .cert-card .cdesc{ font-size:12px; color:var(--cert-muted); margin-bottom:18px; }
  .cert-foot{ display:flex; justify-content:space-between; align-items:flex-end; border-top:1px solid var(--cert-line); padding-top:14px; }
  .cert-foot .l{ font-size:10px; color:var(--cert-muted); }
  .cert-foot .v{ font-family:'Chakra Petch'; font-weight:600; font-size:13px; color:var(--cert-text); }

  .quiz-q{ font-size:13px; color:var(--text); margin-bottom:10px; }

  /* Gallery FAB + overlay */
  .gallery-fab{ position:fixed; right:16px; bottom:22px; z-index:20; width:58px; height:58px; border-radius:50%;
    border:1px solid rgba(255,255,255,.45); background:radial-gradient(circle at 34% 28%,rgba(255,255,255,.55),rgba(255,150,90,.4) 46%,rgba(217,32,0,.55));
    box-shadow:0 10px 28px var(--glow), inset 0 1px 6px rgba(255,255,255,.5); cursor:pointer; display:flex; align-items:center;
    justify-content:center; color:#fff; animation:anx-fab 4s ease-in-out infinite; }
  .gallery-fab .badge-count{ position:absolute; top:-4px; right:-4px; min-width:20px; height:20px; padding:0 5px; border-radius:999px;
    background:#fff; color:#b3160a; font-family:'Chakra Petch'; font-weight:700; font-size:11px; display:flex; align-items:center;
    justify-content:center; box-shadow:0 2px 6px rgba(0,0,0,.3); }
  .gallery-overlay{ position:fixed; inset:0; z-index:30; display:flex; flex-direction:column; overflow:hidden; animation:anx-fade .3s ease both;
    background:linear-gradient(180deg,#3a0e08 0%,#7a1a0c 46%,#240611 100%); }
  .gallery-overlay .bg-blob{ position:absolute; border-radius:50%; pointer-events:none; filter:blur(8px); animation:anx-breathe 8s ease-in-out infinite; }
  .gallery-head{ position:relative; z-index:2; display:flex; align-items:center; justify-content:space-between; padding:20px 20px 14px; }
  .gallery-head h2{ margin:0; font-family:'Chakra Petch'; font-weight:600; font-size:20px; color:#fff; }
  .gallery-head p{ margin:1px 0 0; font-size:11px; letter-spacing:1px; color:rgba(255,255,255,.7); }
  .gallery-close{ width:38px; height:38px; border-radius:50%; background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.24);
    color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .gallery-feed{ position:relative; z-index:2; flex:1; overflow-y:auto; padding:4px 16px 26px; display:flex; flex-direction:column; gap:16px; max-width:480px; margin:0 auto; width:100%; }
  .gal-card{ position:relative; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.18); border-radius:20px;
    padding:14px; backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); }
  .gal-card.composer{ background:rgba(255,255,255,.1); border-color:rgba(255,255,255,.26); }
  .gal-avatar{ width:38px; height:38px; border-radius:50%; background:linear-gradient(135deg,#ff9a5a,#d92000); display:flex;
    align-items:center; justify-content:center; font-family:'Chakra Petch'; font-weight:700; color:#fff; flex-shrink:0; }
  .gal-card .gal-head{ display:flex; align-items:center; gap:10px; margin-bottom:12px; }
  .gal-card .gname{ font-family:'Chakra Petch'; font-weight:600; font-size:14px; color:#fff; }
  .gal-card .gsub{ font-size:11px; color:rgba(255,255,255,.7); }
  .gal-photo-slot{ width:100%; aspect-ratio:4/3; border-radius:14px; overflow:hidden; border:1px solid rgba(255,255,255,.22);
    margin-bottom:10px; background:rgba(0,0,0,.2); display:flex; align-items:center; justify-content:center; cursor:pointer; position:relative; }
  .gal-photo-slot img{ width:100%; height:100%; object-fit:cover; }
  .gal-photo-slot .placeholder{ color:rgba(255,255,255,.6); font-size:12px; text-align:center; padding:10px; font-family:'IBM Plex Sans Thai'; }
  .gal-note-input{ width:100%; min-height:46px; padding:11px 13px; border-radius:12px; background:rgba(0,0,0,.25);
    border:1px solid rgba(255,255,255,.2); color:#fff; font-family:'IBM Plex Sans Thai'; font-size:13px; outline:none; resize:none; }
  .gal-note-input:focus{ border-color:rgba(255,255,255,.55); }
  .gal-note-text{ margin:0 0 12px; font-size:13.5px; line-height:1.5; color:rgba(255,255,255,.92); }
  .gal-actions{ display:flex; align-items:center; gap:20px; }
  .gal-like-btn, .gal-comment-btn{ display:inline-flex; align-items:center; gap:6px; background:transparent; border:none; cursor:pointer;
    font-family:'Chakra Petch'; font-weight:600; font-size:13px; color:rgba(255,255,255,.92); padding:0; width:auto; }
  .gal-like-btn.liked{ color:#ff6b7d; }
  .gal-comments{ margin-top:13px; display:flex; flex-direction:column; gap:10px; }
  .gal-comment-item{ display:flex; gap:8px; align-items:flex-start; }
  .gal-comment-avatar{ width:26px; height:26px; border-radius:50%; background:rgba(255,255,255,.16); display:flex; align-items:center;
    justify-content:center; font-family:'Chakra Petch'; font-weight:600; font-size:11px; color:#fff; flex-shrink:0; }
  .gal-comment-text{ font-size:12.5px; line-height:1.45; color:rgba(255,255,255,.9); }
  .gal-comment-row{ display:flex; gap:8px; margin-top:2px; }
  .gal-comment-field{ flex:1; min-width:0; padding:9px 13px; border-radius:999px; background:rgba(0,0,0,.25);
    border:1px solid rgba(255,255,255,.2); color:#fff; font-family:'IBM Plex Sans Thai'; font-size:12.5px; outline:none; }
  .gal-comment-send{ padding:9px 15px; border-radius:999px; border:none; background:#fff; color:#b3160a; font-family:'Chakra Petch';
    font-weight:600; font-size:12.5px; cursor:pointer; flex-shrink:0; width:auto; }
  .gal-login-nudge{ text-align:center; padding:14px; font-size:12.5px; color:rgba(255,255,255,.85); background:rgba(255,255,255,.08);
    border-radius:12px; }
  .gal-post-btn{ margin-top:10px; }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
/* ================= CONFIG ================= */
const DEMO_MODE = false;
const API_BASE_URL = "https://script.google.com/macros/s/AKfycbxlGc6JxljLQgNQlaWhFTuUI4mXj8b-XTYrtpkX9DpYAA2Df7U734Uyqn7F6yc1S3jY/exec";

/* ================= DEMO MOCK BACKEND ================= */
const LS_PARTICIPANTS='ainext_participants', LS_CONFIG='ainext_config', LS_GALLERY='ainext_gallery',
      LS_LIKES='ainext_likes', LS_COMMENTS='ainext_comments', LS_QUESTIONS='ainext_questions';

function seedDemo(){
  if(!localStorage.getItem(LS_PARTICIPANTS)){
    localStorage.setItem(LS_PARTICIPANTS, JSON.stringify([
      {AttendeeID:'A001', FirstName:'สมชาย', LastName:'ใจดี', Team:'Team Rocket AI', Confirmed:true, Stage1_Time:null, Stage2_Time:null, Stage2_Answer:'', Stage3_Time:null, Stage3_PhotoURL:'', Stage3_Note:'', CertIssued:false},
      {AttendeeID:'A002', FirstName:'Jane', LastName:'Doe', Team:'Neural Ninjas', Confirmed:true, Stage1_Time:null, Stage2_Time:null, Stage2_Answer:'', Stage3_Time:null, Stage3_PhotoURL:'', Stage3_Note:'', CertIssued:false},
      {AttendeeID:'A003', FirstName:'ไม่', LastName:'ยืนยัน', Team:'', Confirmed:false, Stage1_Time:null, Stage2_Time:null, Stage2_Answer:'', Stage3_Time:null, Stage3_PhotoURL:'', Stage3_Note:'', CertIssued:false}
    ]));
  }
  if(!localStorage.getItem(LS_CONFIG)){
    localStorage.setItem(LS_CONFIG, JSON.stringify({
      stage1_open:true, stage2_open:false, stage3_open:false, cert_open:false,
      admin_password:'ainext2026', event_name:'AI NEXT',
      cooldown_msg_1:'รอทีมงานเปิดกิจกรรมช่วงบ่าย...',
      cooldown_msg_2:'รอทีมงานเปิดกิจกรรม AI NEXT Challenge...',
      cooldown_msg_3:'รอทีมงานประกาศผล และปล่อย Certificate...'
    }));
  }
  if(!localStorage.getItem(LS_GALLERY)) localStorage.setItem(LS_GALLERY, JSON.stringify([]));
  if(!localStorage.getItem(LS_LIKES)) localStorage.setItem(LS_LIKES, JSON.stringify([]));
  if(!localStorage.getItem(LS_COMMENTS)) localStorage.setItem(LS_COMMENTS, JSON.stringify([]));
  if(!localStorage.getItem(LS_QUESTIONS)) localStorage.setItem(LS_QUESTIONS, JSON.stringify([]));
}
function readLS(k){ return JSON.parse(localStorage.getItem(k) || 'null'); }
function writeLS(k,v){ localStorage.setItem(k, JSON.stringify(v)); }
function genId(){ return Math.random().toString(36).slice(2,10); }
function participantStage(p){
  if(p.CertIssued) return 4;
  if(p.Stage3_Time) return 3;
  if(p.Stage2_Time) return 2;
  if(p.Stage1_Time) return 1;
  return 0;
}
function normalizeName(s){ return String(s||'').trim().toLowerCase().replace(/\s+/g,' '); }

function mockApi(action, params){
  seedDemo();
  return new Promise(resolve=>{
    setTimeout(()=>{
      const cfg = readLS(LS_CONFIG);
      let parts = readLS(LS_PARTICIPANTS);
      let gallery = readLS(LS_GALLERY);
      let likes = readLS(LS_LIKES);
      let comments = readLS(LS_COMMENTS);
      let questions = readLS(LS_QUESTIONS);

      if(action==='checkin'){
        const name = normalizeName(params.name);
        if(!name) return resolve({success:false, reason:'empty_name'});
        const idx = parts.findIndex(p=>normalizeName(p.FirstName+' '+p.LastName)===name);
        if(idx<0) return resolve({success:false, reason:'not_found'});
        if(!parts[idx].Confirmed) return resolve({success:false, reason:'not_confirmed'});
        if(!parts[idx].Stage1_Time) parts[idx].Stage1_Time = new Date().toISOString();
        writeLS(LS_PARTICIPANTS, parts);
        return resolve({success:true, attendeeId:parts[idx].AttendeeID, firstName:parts[idx].FirstName,
          lastName:parts[idx].LastName, team:parts[idx].Team, stage:participantStage(parts[idx]),
          stage1_open:!!cfg.stage1_open, stage2_open:!!cfg.stage2_open, stage3_open:!!cfg.stage3_open, cert_open:!!cfg.cert_open});
      }
      if(action==='getStatus'){
        const activeQ = questions.find(q=>q.active);
        const resp = {success:true, event_name:cfg.event_name,
          question_text: activeQ? activeQ.text : '', question_id: activeQ? activeQ.id : '',
          cooldown_msg_1:cfg.cooldown_msg_1, cooldown_msg_2:cfg.cooldown_msg_2, cooldown_msg_3:cfg.cooldown_msg_3,
          stage1_open:!!cfg.stage1_open, stage2_open:!!cfg.stage2_open, stage3_open:!!cfg.stage3_open, cert_open:!!cfg.cert_open};
        if(params.attendeeId){
          const p = parts.find(p=>p.AttendeeID===params.attendeeId);
          if(p){ resp.stage = participantStage(p); resp.team = p.Team; resp.certIssued = !!p.CertIssued; }
        }
        return resolve(resp);
      }
      if(action==='submitAnswer'){
        if(!cfg.stage2_open) return resolve({success:false, reason:'stage2_closed'});
        const idx = parts.findIndex(p=>p.AttendeeID===params.attendeeId);
        if(idx<0) return resolve({success:false, reason:'not_found'});
        if(!parts[idx].Stage2_Time) parts[idx].Stage2_Time = new Date().toISOString();
        parts[idx].Stage2_Answer = params.answer||'';
        writeLS(LS_PARTICIPANTS, parts);
        return resolve({success:true});
      }
      if(action==='submitSelfie' || action==='uploadGalleryPost'){
        if(action==='submitSelfie' && !cfg.stage3_open) return resolve({success:false, reason:'stage3_closed'});
        const idx = parts.findIndex(p=>p.AttendeeID===params.attendeeId);
        if(idx<0) return resolve({success:false, reason:'not_found'});
        const photoUrl = params.imageBase64 ? ('data:'+(params.mimeType||'image/jpeg')+';base64,'+params.imageBase64) : '';
        if(action==='submitSelfie' && !parts[idx].Stage3_Time){
          parts[idx].Stage3_Time = new Date().toISOString();
          parts[idx].Stage3_PhotoURL = photoUrl;
          parts[idx].Stage3_Note = params.note||'';
          writeLS(LS_PARTICIPANTS, parts);
        }
        const postId = genId();
        gallery.push({postId, timestamp:new Date().toISOString(), attendeeId:params.attendeeId,
          name:(parts[idx].FirstName+' '+parts[idx].LastName).trim(), team:params.team||parts[idx].Team,
          photoUrl, note:params.note||'', likes:0});
        writeLS(LS_GALLERY, gallery);
        return resolve({success:true, photoUrl, postId});
      }
      if(action==='getGallery'){
        const list = gallery.slice(-300).reverse().map(g=>{
          const likedByMe = params.attendeeId ? likes.some(l=>l.postId===g.postId && l.attendeeId===params.attendeeId) : false;
          const commentCount = comments.filter(c=>c.postId===g.postId).length;
          return {...g, likedByMe, commentCount};
        });
        return resolve({success:true, items:list});
      }
      if(action==='likePost'){
        const gIdx = gallery.findIndex(g=>g.postId===params.postId);
        if(gIdx<0) return resolve({success:false, reason:'not_found'});
        const likeIdx = likes.findIndex(l=>l.postId===params.postId && l.attendeeId===params.attendeeId);
        let liked;
        if(likeIdx>=0){ likes.splice(likeIdx,1); gallery[gIdx].likes = Math.max(0,(gallery[gIdx].likes||0)-1); liked=false; }
        else{ likes.push({postId:params.postId, attendeeId:params.attendeeId}); gallery[gIdx].likes = (gallery[gIdx].likes||0)+1; liked=true; }
        writeLS(LS_LIKES, likes); writeLS(LS_GALLERY, gallery);
        return resolve({success:true, liked, likes:gallery[gIdx].likes});
      }
      if(action==='getComments'){
        return resolve({success:true, items: comments.filter(c=>c.postId===params.postId)});
      }
      if(action==='addComment'){
        const p = parts.find(p=>p.AttendeeID===params.attendeeId);
        if(!p) return resolve({success:false, reason:'not_found'});
        const name = (p.FirstName+' '+p.LastName).trim();
        const c = {postId:params.postId, name, comment:params.comment, timestamp:new Date().toISOString()};
        comments.push(c); writeLS(LS_COMMENTS, comments);
        return resolve({success:true, comment:c});
      }
      if(action==='adminLogin') return resolve({success: String(params.password)===String(cfg.admin_password)});
      if(action==='adminUnlock'){
        if(String(params.password)!==String(cfg.admin_password)) return resolve({success:false, reason:'bad_password'});
        const map = {1:'stage1_open',2:'stage2_open',3:'stage3_open',4:'cert_open'};
        const key = map[params.stage]; if(!key) return resolve({success:false, reason:'bad_stage'});
        cfg[key] = !!params.open;
        if(params.stage==4 && params.open){
          parts = parts.map(p=> (p.Stage3_Time && !p.CertIssued) ? {...p, CertIssued:true} : p);
          writeLS(LS_PARTICIPANTS, parts);
        }
        writeLS(LS_CONFIG, cfg);
        return resolve({success:true});
      }
      if(action==='adminStats'){
        if(String(params.password)!==String(cfg.admin_password)) return resolve({success:false, reason:'bad_password'});
        const stats = {total:parts.length, confirmed:0, stage1:0, stage2:0, stage3:0, cert:0,
          stage1_open:!!cfg.stage1_open, stage2_open:!!cfg.stage2_open, stage3_open:!!cfg.stage3_open, cert_open:!!cfg.cert_open,
          galleryPosts: gallery.length};
        parts.forEach(p=>{ if(p.Confirmed) stats.confirmed++; if(p.Stage1_Time) stats.stage1++; if(p.Stage2_Time) stats.stage2++; if(p.Stage3_Time) stats.stage3++; if(p.CertIssued) stats.cert++; });
        return resolve({success:true, stats});
      }
      if(action==='adminListQuestions'){
        if(String(params.password)!==String(cfg.admin_password)) return resolve({success:false, reason:'bad_password'});
        return resolve({success:true, items:questions});
      }
      if(action==='adminAddQuestion'){
        if(String(params.password)!==String(cfg.admin_password)) return resolve({success:false, reason:'bad_password'});
        const id = genId();
        questions.push({id, text:params.text, active:false});
        writeLS(LS_QUESTIONS, questions);
        return resolve({success:true, id});
      }
      if(action==='adminSetActiveQuestion'){
        if(String(params.password)!==String(cfg.admin_password)) return resolve({success:false, reason:'bad_password'});
        questions = questions.map(q=>({...q, active: q.id===params.questionId}));
        writeLS(LS_QUESTIONS, questions);
        return resolve({success:true});
      }
      if(action==='adminSearchParticipants'){
        if(String(params.password)!==String(cfg.admin_password)) return resolve({success:false, reason:'bad_password'});
        const q = normalizeName(params.query||'');
        let rows = parts;
        if(q) rows = rows.filter(p=>normalizeName(p.AttendeeID+' '+p.FirstName+' '+p.LastName+' '+p.Team).includes(q));
        const items = rows.slice(0,40).map(p=>({attendeeId:p.AttendeeID, firstName:p.FirstName, lastName:p.LastName,
          team:p.Team, confirmed:!!p.Confirmed, stage1:!!p.Stage1_Time, stage2:!!p.Stage2_Time, stage3:!!p.Stage3_Time, certIssued:!!p.CertIssued}));
        return resolve({success:true, items});
      }
      if(action==='adminUpdateParticipant'){
        if(String(params.password)!==String(cfg.admin_password)) return resolve({success:false, reason:'bad_password'});
        const idx = parts.findIndex(p=>p.AttendeeID===params.attendeeId);
        if(idx<0) return resolve({success:false, reason:'not_found'});
        const patch = params.patch||{};
        if(typeof patch.confirmed==='boolean') parts[idx].Confirmed = patch.confirmed;
        if(typeof patch.team==='string') parts[idx].Team = patch.team;
        if(typeof patch.stage1==='boolean') parts[idx].Stage1_Time = patch.stage1 ? (parts[idx].Stage1_Time||new Date().toISOString()) : null;
        if(typeof patch.stage2==='boolean') parts[idx].Stage2_Time = patch.stage2 ? (parts[idx].Stage2_Time||new Date().toISOString()) : null;
        if(typeof patch.stage3==='boolean') parts[idx].Stage3_Time = patch.stage3 ? (parts[idx].Stage3_Time||new Date().toISOString()) : null;
        if(typeof patch.certIssued==='boolean') parts[idx].CertIssued = patch.certIssued;
        writeLS(LS_PARTICIPANTS, parts);
        return resolve({success:true});
      }
      resolve({success:false, error:'unknown_action'});
    }, 180);
  });
}

async function callApi(action, params={}){
  if(DEMO_MODE) return mockApi(action, params);
  const res = await fetch(API_BASE_URL, {
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify({action, ...params})
  });
  return res.json();
}

  screen='validating'; screenValidating();

  if(!res.success){
    if(res.reason==='not_confirmed'){ screen='denied'; screenDenied(); return; }

async function screenHub(){
  if(screen!=='hub') return;
  const profile = getProfile();
  if(!profile){ screen='landing'; screenLanding(); return; }
  const status = await callApi('getStatus', {attendeeId: profile.attendeeId});
  if(screen!=='hub') return;
  latestStatus = status;
  const completed = status.stage ?? 1;
  const doneQuiz = completed>=2, doneSelfie = completed>=3;
  const doneCount = 1 + (doneQuiz?1:0) + (doneSelfie?1:0);

  const hasNewQuestion = status.question_id && status.question_id !== getLastAnsweredQId();

  function cardFor(kind){
    if(kind==='morning'){
      return { done:true, n:'1', title:'Morning · เช็คอิน', sub:'รับ welcome kit แล้ว', status:'เสร็จ', onClick:null };
    }
    if(kind==='quiz'){
      if(doneQuiz && !hasNewQuestion) return { done:true, n:'2', title:'Lunch · ตอบคำถามสั้นๆ', sub:'ตอบแล้ว', status:'เสร็จ', onClick:null };
      if(!status.stage2_open) return { done:false, n:'2', title:'Lunch · ตอบคำถามสั้นๆ', sub:'ยังไม่เปิด', status:'ล็อก', onClick:()=>startCooldown('quiz') };
      if(!status.question_id) return { done:false, n:'2', title:'Lunch · ตอบคำถามสั้นๆ', sub:'รอทีมงานเพิ่มคำถาม', status:'รอคำถาม', onClick:()=>startCooldown('quiz') };
      return { done:false, n:'2', title:'Lunch · ตอบคำถามสั้นๆ', sub: hasNewQuestion&&doneQuiz? 'มีคำถามใหม่!' : '12:30–13:30', status:'ทำเลย', onClick:()=>{ screen='quiz'; screenQuiz(); } };
    }
    if(kind==='selfie'){
      if(doneSelfie) return { done:true, n:'3', title:'After Break · Team Selfie', sub:'อัปโหลดแล้ว', status:'เสร็จ', onClick:null };
      if(!status.stage3_open) return { done:false, n:'3', title:'After Break · Team Selfie', sub:'ยังไม่เปิด', status:'ล็อก', onClick:()=>startCooldown('selfie') };
      return { done:false, n:'3', title:'After Break · Team Selfie', sub:'16:45–17:30 · Gallery Wall', status:'ทำเลย', onClick:()=>{ screen='selfie'; screenSelfie(); } };
    }
  }
  const cards = ['morning','quiz','selfie'].map(cardFor);

/* ================= COOLDOWN ================= */
function startCooldown(target){
  cooldownTarget = target;
  screen='cooldown';

}

function screenCooldown(){
  stopAllPolls();
  const labelMap = { quiz:'Lunch · Question', selfie:'After Break · Selfie', cert:'Certificate' };
  shell(`
    <div class="screen">
      <div class="kicker" style="color:var(--accent)"><span style="width:8px;height:8px;border-radius:50%;background:var(--accent);display:inline-block;animation:anx-blink 1.4s infinite"></span>Cooldown · ${labelMap[cooldownTarget]||'Task'}</div>

        <p class="desc" style="max-width:290px">กิจกรรมนี้ยังไม่เปิด — ทีมงานจะปลดล็อกให้ทุกคนพร้อมกัน หน้านี้จะเปลี่ยนอัตโนมัติ<br><span style="font-size:12px;opacity:.8">Not open yet — staff will unlock it for everyone. This page updates automatically.</span></p>
        <div class="dial-wrap"><div class="dial-ring"></div><div class="dial-inner">${iconClock()}</div></div>
      </div>
      <button class="ghost-btn" id="backHubBtn">กลับหน้ากิจกรรม · Back to hub</button>
    </div>
  `, true);
  document.getElementById('backHubBtn').onclick = ()=>{ screen='hub'; screenHub(); };
  cooldownPollTimer = setInterval(checkCooldownUnlocked, 3500);
  checkCooldownUnlocked();
}

async function checkCooldownUnlocked(){
  if(screen!=='cooldown') return;
  const profile = getProfile();
  const status = await callApi('getStatus', {attendeeId: profile.attendeeId});
  if(screen!=='cooldown') return;
  const openMap = { quiz: status.stage2_open && status.question_id, selfie: status.stage3_open, cert: status.cert_open };
  if(openMap[cooldownTarget]){
    stopCooldownPoll();
    screen='hub'; screenHub();
  }
}

function screenSelfie(){
  stopAllPolls();
  const profile = getProfile();
  shell(`
    <div class="screen">

      <div id="sErr"></div>
      <button class="cta-btn" id="submitSelfieBtn">อัปขึ้น Gallery Wall · Post</button>
    </div>
  `, true);
  document.getElementById('hubBackBtn').onclick = ()=>{ screen='hub'; screenHub(); };

  let resizedBase64 = null, mimeType = 'image/jpeg';
  document.getElementById('photoSlot').onclick = ()=> document.getElementById('photoInput').click();
  document.getElementById('photoInput').addEventListener('change', (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev)=>{
      const img = new Image();
      img.onload = ()=>{
        const maxW = 900;
        const scale = Math.min(1, maxW/img.width);
        const canvas = document.createElement('canvas');
        canvas.width = img.width*scale; canvas.height = img.height*scale;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img,0,0,canvas.width,canvas.height);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.72);
        resizedBase64 = dataUrl.split(',')[1];
        document.getElementById('photoPreview').src = dataUrl;
        document.getElementById('photoPreview').style.display='block';
        document.getElementById('photoPlaceholder').style.display='none';
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });

  document.getElementById('submitSelfieBtn').onclick = async ()=>{
    if(!resizedBase64){ document.getElementById('sErr').innerHTML = '<p class="error-msg">กรุณาแนบรูปถ่ายก่อน</p>'; return; }
    const btn = document.getElementById('submitSelfieBtn');
    btn.disabled=true; btn.textContent='กำลังอัปโหลด...';
    const team = document.getElementById('teamInput').value.trim();
    const note = document.getElementById('noteInput').value.trim();
    const res = await callApi('submitSelfie', {attendeeId: profile.attendeeId, team, note, imageBase64: resizedBase64, mimeType});
    if(!res.success){ document.getElementById('sErr').innerHTML = '<p class="error-msg">อัปโหลดไม่สำเร็จ ลองใหม่อีกครั้ง</p>'; btn.disabled=false; btn.textContent='อัปขึ้น Gallery Wall · Post'; return; }
    if(team){ profile.team = team; setProfile(profile); }
    screen='hub'; screenHub();
  };
}

        <button class="gal-like-btn ${it.likedByMe?'liked':''}" data-like="${it.postId}">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="${it.likedByMe?'#ff6b7d':'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"></path></svg>
          ${it.likes||0}
        </button>
        <button class="gal-comment-btn" data-togglec="${it.postId}">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
          ${it.commentCount||0}

      if(!file) return;

          canvas.width = img.width*scale; canvas.height = img.height*scale;

let openCommentPostId = null;
function toggleComments(postId){
  const slot = document.querySelector(`[data-cslot="${postId}"]`);
  if(!slot) return;
  if(openCommentPostId===postId){ slot.innerHTML=''; openCommentPostId=null; return; }
  openCommentPostId = postId;
  loadComments(postId);
}

async function loadComments(postId){
  let slot = document.querySelector(`[data-cslot="${postId}"]`);
  if(!slot || !slot.isConnected) return;
  slot.innerHTML = `<div class="gal-comments"><span style="font-size:11px;opacity:.7">กำลังโหลด...</span></div>`;
  const res = await callApi('getComments', {postId});
  // The gallery overlay may have been closed (or re-rendered) while this request was in flight.
  slot = document.querySelector(`[data-cslot="${postId}"]`);
  if(!slot || !slot.isConnected) return;
  const profile = getProfile();
  const items = res.success ? res.items : [];
  slot.innerHTML = `
    <div class="gal-comments">
      ${items.map(c=>`<div class="gal-comment-item"><div class="gal-comment-avatar">${(c.name||'?')[0]}</div><div class="gal-comment-text"><b style="color:#fff">${c.name}</b> ${c.comment}</div></div>`).join('')}
      ${profile ? `
        <div class="gal-comment-row">
          <input class="gal-comment-field" id="commentField-${postId}" placeholder="เพิ่มความคิดเห็น…">
          <button class="gal-comment-send" id="commentSend-${postId}">ส่ง</button>
        </div>
      ` : `<div class="gal-login-nudge">เช็คอินก่อน เพื่อคอมเมนต์</div>`}
    </div>
  `;
  if(profile){
    const send = async ()=>{
      const field = document.getElementById(`commentField-${postId}`);
      if(!field) return;
      const text = field.value.trim();
      if(!text) return;
      const res2 = await callApi('addComment', {attendeeId: profile.attendeeId, postId, comment: text});
      if(res2.success){
        const item = galleryItemsCache.find(g=>g.postId===postId);
        if(item) item.commentCount = (item.commentCount||0)+1;
        if(field.isConnected) field.value='';
        loadComments(postId);
      }
    };
    const sendBtn = document.getElementById(`commentSend-${postId}`);
    const fieldEl = document.getElementById(`commentField-${postId}`);
    if(sendBtn) sendBtn.onclick = send;
    if(fieldEl) fieldEl.addEventListener('keydown', e=>{ if(e.key==='Enter') send(); });
  }
}

/* ================= INIT ================= */
(function init(){
  seedDemo();
  const profile = getProfile();
  if(profile){ screen='hub'; screenHub(); }
  else { screen='landing'; screenLanding(); }
})();
</script>
