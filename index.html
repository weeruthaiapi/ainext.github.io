<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>AI NEXT — Registration</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=IBM+Plex+Sans+Thai:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  /* ===== Solar CI ===== */
  :root{
    --accent:#fff; --accent-soft:rgba(255,255,255,.18); --glow:rgba(255,120,40,.55);
    --surface:rgba(20,0,2,.30); --surface-brd:rgba(255,255,255,.32); --line:rgba(255,255,255,.26);
    --muted:rgba(255,236,227,.85); --chip:rgba(0,0,0,.26); --bar:rgba(90,10,4,.35); --grid:rgba(255,255,255,.06);
    --dial:#8a1204; --text:#fff; --cta-bg:#fff; --cta-text:#b3160a; --gold:#FFD98A; --ok:#4CD98B;
    --cert-bg:linear-gradient(150deg,#F37100,#8a1204); --cert-text:#fff; --cert-muted:rgba(255,236,227,.82); --cert-line:rgba(255,255,255,.35);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{ height:100%; }
  body{
    margin:0; min-height:100vh; color:var(--text); font-family:'IBM Plex Sans Thai',sans-serif;
    background: linear-gradient(158deg,#F37100 0%,#D92000 48%,#5A0006 100%); background-attachment: fixed;
  }
  .app{ position:relative; max-width:480px; margin:0 auto; min-height:100vh; overflow:hidden; }
  .grid-overlay{ position:absolute; inset:0; pointer-events:none;
    background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px); background-size:34px 34px; }
  .blob-tr{ position:absolute; top:-90px; right:-70px; width:260px; height:260px; border-radius:50%; background:radial-gradient(circle,var(--glow),transparent 68%); filter:blur(6px); pointer-events:none; }
  .blob-bl{ position:absolute; bottom:-120px; left:-80px; width:300px; height:300px; border-radius:50%; background:radial-gradient(circle,var(--glow),transparent 70%); opacity:.5; pointer-events:none; }
  .content{ position:relative; z-index:2; min-height:100vh; display:flex; flex-direction:column; }

  .appbar{ flex-shrink:0; display:none; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--surface-brd); background:var(--bar); }
  .appbar.show{ display:flex; }
  .appbar .brand img{ height:42px; width:auto; display:block; }
  .appbar .cert-chip{ display:inline-flex; align-items:center; gap:7px; background:var(--chip); border:1px solid var(--surface-brd); border-radius:999px; padding:6px 12px; cursor:pointer; color:var(--text); font-family:'Chakra Petch'; font-weight:600; font-size:12px; letter-spacing:1px; }

  .screen-wrap{ flex:1; overflow-y:auto; padding:26px 22px 34px; }
  .screen{ min-height:100%; display:flex; flex-direction:column; animation:anx-rise .45s ease both; }
  @keyframes anx-rise{ 0%{opacity:0; transform:translateY(16px);} 100%{opacity:1; transform:translateY(0);} }
  @keyframes anx-float{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }
  @keyframes anx-spin{ to{transform:rotate(360deg);} }
  @keyframes anx-blink{ 0%,100%{opacity:.25;} 50%{opacity:1;} }
  @keyframes anx-shine{ 0%{background-position:-160% 0;} 100%{background-position:260% 0;} }
  @keyframes anx-pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,217,138,.5);}50%{box-shadow:0 0 0 12px rgba(255,217,138,0);}}
  @keyframes anx-fall{ to{ transform:translateY(110vh) rotate(720deg); opacity:.5; } }

  .kicker{ display:flex; align-items:center; gap:8px; font-family:'Chakra Petch'; font-size:11px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; }
  .kicker .bar{ width:20px; height:2px; background:var(--accent); display:inline-block; }
  h1.title{ margin:16px 0 4px; font-family:'Chakra Petch'; font-weight:600; font-size:23px; color:var(--text); }
  h2.title{ margin:0 0 4px; font-family:'Chakra Petch'; font-weight:600; font-size:24px; color:var(--text); }
  .subtitle{ margin:0; font-family:'Chakra Petch'; font-size:12px; letter-spacing:3px; color:var(--accent); text-transform:uppercase; }
  .desc{ margin:14px 0 0; font-size:13.5px; line-height:1.6; color:var(--muted); }

  .session-row{ display:flex; align-items:center; gap:12px; background:var(--surface); border:1px solid var(--surface-brd); border-radius:13px; padding:12px 14px; }
  .session-row .time{ font-family:'Chakra Petch'; font-weight:600; font-size:13px; color:var(--accent); width:66px; flex-shrink:0; }
  .session-row .stitle{ font-family:'Chakra Petch'; font-weight:600; font-size:14px; color:var(--text); }
  .session-row .ssub{ font-size:11.5px; color:var(--muted); }

  .cta-btn, .ghost-btn, .back-btn, .line-btn{ font-family:'Chakra Petch'; cursor:pointer; }
  .cta-btn{ display:inline-flex; align-items:center; justify-content:center; gap:9px; width:100%; padding:16px 20px; border:none; border-radius:14px; background:var(--cta-bg); color:var(--cta-text); font-weight:600; font-size:15px; letter-spacing:.4px; box-shadow:0 12px 30px var(--glow); transition:transform .16s ease; margin-top:14px; }
  .cta-btn:hover{ transform:translateY(-2px); }
  .cta-btn:disabled{ opacity:.5; cursor:not-allowed; transform:none; }
  .line-btn{ display:inline-flex; align-items:center; justify-content:center; gap:9px; width:100%; padding:15px 20px; border:none; border-radius:14px; background:#06C755; color:#fff; font-weight:600; font-size:15px; margin-top:14px; box-shadow:0 10px 26px rgba(6,199,85,.35); }
  .ghost-btn{ width:100%; padding:14px; border-radius:13px; background:transparent; border:1px solid var(--surface-brd); color:var(--text); font-weight:500; font-size:13.5px; margin-top:10px; }
  .back-btn{ align-self:flex-start; display:inline-flex; align-items:center; gap:6px; background:transparent; border:none; color:var(--muted); font-size:13px; padding:0; margin-bottom:20px; }
  .admin-link{ display:inline-flex; align-items:center; justify-content:center; gap:6px; background:transparent; border:none; color:var(--muted); font-family:'Chakra Petch'; font-size:12px; cursor:pointer; margin-top:14px; text-decoration:none; }

  .field{ width:100%; padding:16px 18px; border-radius:13px; background:var(--chip); border:1px solid var(--surface-brd); color:var(--text); font-family:'Chakra Petch'; font-size:16px; letter-spacing:.5px; outline:none; }
  .field:focus{ border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
  textarea.field{ font-family:'IBM Plex Sans Thai'; font-size:14px; min-height:80px; resize:vertical; letter-spacing:normal; }
  .error-msg{ margin:10px 0 0; color:#fff; background:rgba(0,0,0,.28); border:1px solid var(--surface-brd); border-radius:10px; padding:9px 12px; font-size:12.5px; }

  .agree{ display:flex; gap:11px; align-items:flex-start; font-size:13px; color:var(--text); margin-top:14px; background:var(--surface); border:1px solid var(--surface-brd); border-radius:13px; padding:13px 14px; cursor:pointer; }
  .agree input{ width:22px; height:22px; accent-color:#fff; flex:0 0 auto; margin-top:1px; }
  .agree .sub{ color:var(--muted); font-size:11.5px; display:block; margin-top:2px; }

  .dial-wrap{ position:relative; width:170px; height:170px; border-radius:50%; margin:6px auto; display:flex; align-items:center; justify-content:center; }
  .dial-ring{ position:absolute; inset:0; border-radius:50%; border:4px solid transparent; border-top-color:var(--accent); border-right-color:var(--accent); animation:anx-spin 1.3s linear infinite; }
  .dial-inner{ position:absolute; inset:11px; border-radius:50%; background:var(--dial); display:flex; align-items:center; justify-content:center; border:1px solid var(--surface-brd); text-align:center; padding:10px; }

  .stat-box{ flex:1; background:var(--surface); border:1px solid var(--surface-brd); border-radius:13px; padding:13px; text-align:left; }
  .stat-box .lbl{ font-size:11px; color:var(--muted); }
  .stat-box .val{ font-family:'Chakra Petch'; font-weight:600; font-size:14px; color:var(--text); }

  .progress-card{ background:var(--surface); border:1px solid var(--surface-brd); border-radius:16px; padding:16px; margin-bottom:18px; }
  .progress-card .row{ display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .progress-track{ height:9px; border-radius:999px; background:var(--line); overflow:hidden; }
  .progress-fill{ height:100%; border-radius:999px; background:var(--cta-bg); transition:width .5s ease; }

  /* mission task rows with STAMP */
  .task-card{ display:flex; align-items:center; gap:14px; width:100%; text-align:left; padding:14px; border-radius:14px; cursor:pointer; background:var(--surface); border:1px solid var(--surface-brd); font-family:inherit; color:inherit; }
  .task-card.done{ border-color:var(--gold); }
  .task-card .ttitle{ font-family:'Chakra Petch'; font-weight:600; font-size:15px; color:var(--text); }
  .task-card .tsub{ font-size:11.5px; color:var(--muted); }
  .task-card .badge{ font-family:'Chakra Petch'; font-size:11px; padding:5px 10px; border-radius:999px; flex-shrink:0; border:1px solid var(--surface-brd); color:var(--text); }
  .stamp{ width:52px; height:52px; flex-shrink:0; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Chakra Petch'; font-weight:800; font-size:20px; }
  .stamp.st-done{ border:3px solid var(--gold); color:var(--gold); background:rgba(255,217,138,.14); transform:rotate(-8deg); box-shadow:0 0 16px rgba(255,217,138,.3); }
  .stamp.st-open{ border:3px dashed #fff; color:#fff; background:var(--accent-soft); animation:anx-pulse 1.7s infinite; }
  .stamp.st-lock{ border:2px dashed var(--surface-brd); color:rgba(255,255,255,.45); background:rgba(0,0,0,.15); }

  .checklist-item{ display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--surface-brd); border-radius:12px; padding:11px 13px; }
  .checklist-item .dot{ width:22px; height:22px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; color:var(--cta-text); background:var(--line); }
  .checklist-item .dot.on{ background:var(--cta-bg); }

  /* mission form controls */
  label.q{ display:block; font-size:14px; font-weight:600; margin:18px 0 8px; color:var(--text); line-height:1.5; }
  .scale{ display:flex; gap:8px; }
  .scale button{ flex:1; padding:12px 0; border-radius:11px; border:1px solid var(--surface-brd); background:var(--chip); color:var(--muted); font-size:16px; font-weight:700; cursor:pointer; font-family:'Chakra Petch'; }
  .scale button.sel{ background:var(--cta-bg); color:var(--cta-text); border-color:transparent; }
  .seg{ display:flex; gap:8px; }
  .seg.col{ flex-direction:column; }
  .seg button{ flex:1; padding:12px; border-radius:11px; border:1px solid var(--surface-brd); background:var(--chip); color:var(--muted); font-weight:600; font-size:13.5px; cursor:pointer; font-family:'IBM Plex Sans Thai'; text-align:left; }
  .seg:not(.col) button{ text-align:center; }
  .seg button.sel{ background:var(--cta-bg); color:var(--cta-text); border-color:transparent; }
  .voted-lock{ background:rgba(255,217,138,.12); border:1px solid var(--gold); border-radius:12px; padding:12px 14px; color:var(--gold); font-size:13.5px; }

  .cert-card{ position:relative; border-radius:18px; overflow:hidden; padding:26px 22px; background:var(--cert-bg); border:1px solid var(--accent); box-shadow:0 20px 50px var(--glow); }
  .cert-shine{ position:absolute; inset:0; background:linear-gradient(115deg,transparent 30%,rgba(255,255,255,.14) 50%,transparent 70%); background-size:250% 100%; animation:anx-shine 3.5s linear infinite; pointer-events:none; }
  .cert-card .brand{ font-family:'Chakra Petch'; font-size:10px; letter-spacing:3px; color:var(--cert-muted); text-transform:uppercase; }
  .cert-card .cname{ font-family:'Chakra Petch'; font-weight:600; font-size:26px; color:var(--cert-text); margin:8px 0 2px; }
  .cert-card .cdesc{ font-size:12px; color:var(--cert-muted); margin-bottom:18px; }
  .cert-foot{ display:flex; justify-content:space-between; align-items:flex-end; border-top:1px solid var(--cert-line); padding-top:14px; }
  .cert-foot .l{ font-size:10px; color:var(--cert-muted); }
  .cert-foot .v{ font-family:'Chakra Petch'; font-weight:600; font-size:13px; color:var(--cert-text); }

  .cf{ position:fixed; top:-14px; font-size:20px; z-index:60; pointer-events:none; animation:anx-fall linear forwards; }

  /* ===== Notebook / desktop: fit the screen (phone unchanged) ===== */
  @media (min-width:820px){
    body{ display:flex; align-items:stretch; }
    .app{ max-width:760px; box-shadow:0 0 120px rgba(0,0,0,.25); }
    .screen-wrap{ padding:44px 64px 56px; }
    h1.title, h2.title{ font-size:32px; }
    .desc{ font-size:15px; }
    .cta-btn, .line-btn{ font-size:17px; padding:18px 24px; }
    .task-card .ttitle{ font-size:17px; }
    label.q{ font-size:15.5px; }
    .appbar{ padding:18px 64px; }
    .appbar .brand img{ height:50px; }
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important; transition:none!important;}}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
/* ================= CONFIG ================= */
const DEMO_MODE = false;                          // หลัง Deploy: ตั้ง false + วาง URL
const API_BASE_URL = "https://script.google.com/macros/s/AKfycbwBjLK0dyM7RsVtwoPoPCVuCA9GngcXbJXVlLlDjIzJIUaq5_zXOneEdFDDNaAuK8WZAg/exec";
const OPENCHAT_URL_FALLBACK = "https://line.me/ti/g2/rjoazgqKFHS_5oK3khzSAKXecKsuZqP40sLAOg";
const LOGO = "ainext-logo-bizcore.png";

/* ================= DEMO MOCK ================= */
const LS_ROSTER='ainext_m_roster', LS_CONFIG='ainext_m_config';
const G1=['A','B','C','D','G','I','K'], G2=['E','F','H','J','L','M','N'];
function teamLetter(t){ const m=String(t).toUpperCase().match(/TEAM\s*([A-Z])/); return m?m[1]:''; }
function groupOf(t){ const L=teamLetter(t); return G1.indexOf(L)>=0?1:(G2.indexOf(L)>=0?2:0); }
function seedDemo(){
  if(!localStorage.getItem(LS_ROSTER)){
    localStorage.setItem(LS_ROSTER, JSON.stringify([
      {no:'39',runNo:'A01',name:'ปิยาภา เดชฟุ้ง',nick:'แป้ง',team:'Team A',menu:'ไก่บอนชอน',joinedOpenChat:false,checkedIn:false,m1:false,m2:false,m3:false,cert:false,vote:''},
      {no:'48',runNo:'A04',name:'แพรว ทองดี',nick:'แพรว',team:'Team A',menu:'ไก่บอนชอน',joinedOpenChat:true,checkedIn:false,m1:false,m2:false,m3:false,cert:false,vote:''},
      {no:'10',runNo:'B08',name:'ธนกาญจน์ กันไพเราะ',nick:'แทน',team:'Team B',menu:'กิมจิหมู',joinedOpenChat:false,checkedIn:false,m1:false,m2:false,m3:false,cert:false,vote:''},
      {no:'53',runNo:'C17',name:'เกษราภิพย์ มานะจิระ',nick:'มีมี่',team:'Team C',menu:'ไก่บอนชอน',joinedOpenChat:false,checkedIn:false,m1:false,m2:false,m3:false,cert:false,vote:''},
      {no:'8',runNo:'E15',name:'อธิคม มูฮำหมัดอารี',nick:'ร็อก',team:'Team E',menu:'ปลาทอดบอนชอน',joinedOpenChat:false,checkedIn:false,m1:false,m2:false,m3:false,cert:false,vote:''},
      {no:'20',runNo:'F19',name:'มณีรัตน์ วงศ์เพียรพันธุ์',nick:'เบลล์',team:'Team F',menu:'กิมจิหมู',joinedOpenChat:false,checkedIn:false,m1:false,m2:false,m3:false,cert:false,vote:''}
    ]));
  }
  if(!localStorage.getItem(LS_CONFIG)){
    localStorage.setItem(LS_CONFIG, JSON.stringify({checkin_open:true, mission1_open:true, mission2_open:false, mission3_open:false, cert_open:false, admin_password:'ainext2026', event_name:'AI NEXT', openchat_url:OPENCHAT_URL_FALLBACK}));
  }
}
function readLS(k){ return JSON.parse(localStorage.getItem(k)||'null'); }
function writeLS(k,v){ localStorage.setItem(k, JSON.stringify(v)); }
function normalizeName(s){ return String(s||'').trim().toLowerCase().replace(/\s+/g,' '); }
function stageOf(p){ if(p.m3) return 4; if(p.m2) return 3; if(p.m1) return 2; return 1; }
function voteOpts(roster, group, ownTeam){ const s={}; roster.forEach(p=>{ if(groupOf(p.team)===group && p.team && p.team!==ownTeam) s[p.team]=true; }); return Object.keys(s).sort(); }
function statusOf(p, cfg, roster){
  const parts=p.name.split(' ');
  return { success:true, event_name:cfg.event_name, attendeeId:p.no, runNo:p.runNo, firstName:parts[0], lastName:parts.slice(1).join(' '),
    name:p.name, nick:p.nick, team:p.team, group:groupOf(p.team), menu:p.menu, joinedOpenChat:!!p.joinedOpenChat, checkedIn:!!p.checkedIn,
    openchatUrl:cfg.openchat_url, stage:stageOf(p), done:{m1:!!p.m1,m2:!!p.m2,m3:!!p.m3}, certIssued:!!p.cert,
    mission1_open:!!cfg.mission1_open, mission2_open:!!cfg.mission2_open, mission3_open:!!cfg.mission3_open, cert_open:!!cfg.cert_open,
    myVote:p.vote||'', voteOptions:voteOpts(roster, groupOf(p.team), p.team) };
}
function mockApi(action, params){
  seedDemo();
  return new Promise(resolve=>{ setTimeout(()=>{
    const cfg=readLS(LS_CONFIG); let roster=readLS(LS_ROSTER); const find=id=>roster.find(p=>String(p.no)===String(id));
    if(action==='checkin'){
      const nm=normalizeName(params.name); if(!nm) return resolve({success:false,reason:'empty_name'});
      if(!cfg.checkin_open) return resolve({success:false,reason:'checkin_closed'});
      let matches=roster.filter(p=>normalizeName(p.name.split(' ')[0])===nm);
      if(!matches.length) matches=roster.filter(p=>normalizeName(p.nick)===nm || normalizeName(p.name).indexOf(nm)===0);
      if(!matches.length) return resolve({success:false,reason:'not_found'});
      if(matches.length>1) return resolve({success:true, multiple:true, people:matches.map(p=>({attendeeId:p.no,nick:p.nick,name:p.name,team:p.team,runNo:p.runNo}))});
      return resolve(statusOf(matches[0], cfg, roster));
    }
    if(action==='confirmCheckin'){ if(!params.pdpa) return resolve({success:false,reason:'need_pdpa'});
      const p=find(params.attendeeId); if(!p) return resolve({success:false}); if(params.joinedOpenChat) p.joinedOpenChat=true; p.checkedIn=true; writeLS(LS_ROSTER,roster); return resolve(statusOf(p,cfg,roster)); }
    if(action==='getStatus'){ const p=find(params.attendeeId); if(!p) return resolve({success:false}); return resolve(statusOf(p,cfg,roster)); }
    if(action==='submitMission'){ const p=find(params.attendeeId); if(!p) return resolve({success:false});
      if(!cfg['mission'+params.mission+'_open']) return resolve({success:false,reason:'mission_closed'}); if(!p.checkedIn) return resolve({success:false,reason:'not_checked_in'});
      if(params.mission===3){ const opts=voteOpts(roster,groupOf(p.team),p.team); const v=(params.answers&&params.answers.vote)||''; if(!v||opts.indexOf(v)<0) return resolve({success:false,reason:'bad_vote'}); if(!p.vote) p.vote=v; }
      p['m'+params.mission]=true; writeLS(LS_ROSTER,roster); return resolve(statusOf(p,cfg,roster)); }
    resolve({success:false,error:'unknown_action'});
  },150); });
}
async function callApi(action, params={}){
  if(DEMO_MODE) return mockApi(action, params);
  const res=await fetch(API_BASE_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action,...params})});
  return res.json();
}

/* ================= STATE ================= */
const PROFILE_KEY='ainext_profile';
function getProfile(){ return readLS(PROFILE_KEY); }
function setProfile(p){ writeLS(PROFILE_KEY,p); }
function clearProfile(){ localStorage.removeItem(PROFILE_KEY); }
let screen='landing', checkinError='', latestStatus=null, cooldownTarget=null;
let hubPollTimer=null, cooldownPollTimer=null;
function stopHubPoll(){ if(hubPollTimer){clearInterval(hubPollTimer);hubPollTimer=null;} }
function stopCooldownPoll(){ if(cooldownPollTimer){clearInterval(cooldownPollTimer);cooldownPollTimer=null;} }
function stopAllPolls(){ stopHubPoll(); stopCooldownPoll(); }
const root=document.getElementById('app');

/* ================= ICONS ================= */
function iconArrow(){ return `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"></path></svg>`; }
function iconBack(){ return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 18l-6-6 6-6"></path></svg>`; }
function iconShield(){ return `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>`; }
function iconCheck(){ return `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"></path></svg>`; }
function iconCert(){ return `<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"></path><circle cx="12" cy="8" r="6"></circle></svg>`; }
function iconSearch(){ return `<svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><path d="m21 21-4.3-4.3"></path></svg>`; }
function iconAlert(){ return `<svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.46 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path><path d="M12 9v4"></path><path d="M12 17h.01"></path></svg>`; }
function iconBox(){ return `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"></path><path d="M3.3 7 12 12l8.7-5"></path><path d="M12 22V12"></path></svg>`; }
function iconClock(){ return `<svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 6v6l4 2"></path></svg>`; }
function iconChat(){ return `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>`; }
function iconVote(){ return `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"></path><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>`; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function confetti(){ const em=['🎉','✨','⭐','🔥']; for(let i=0;i<26;i++){ const d=document.createElement('div'); d.className='cf'; d.textContent=em[i%em.length]; d.style.left=(Math.random()*100)+'vw'; d.style.animationDuration=(1.6+Math.random()*1.8)+'s'; document.body.appendChild(d); setTimeout(()=>d.remove(),4000); } }

/* ================= CHECK-IN (ชื่อ) ================= */
function screenCheckin(){
  stopAllPolls();
  shell(`
    <div class="screen">
      <button class="back-btn" id="backBtn">${iconBack()}ย้อนกลับ</button>
      <h2 class="title">เช็คอิน</h2>
      <p class="subtitle">Confirm your attendance</p>
      <label style="font-size:13px;color:var(--muted);margin:14px 0 10px;display:block">กรอก<b style="color:#fff">ชื่อจริง</b>ของคุณ (ตามที่ลงทะเบียน)<br><span style="font-size:11px;opacity:.8">First name as registered</span></label>
      <input class="field" id="nameInput" placeholder="เช่น ภาริตา">
      ${checkinError? `<p class="error-msg">${esc(checkinError)}</p>`:''}
      <button class="cta-btn" id="submitBtn" style="margin-top:20px">ยืนยัน · Confirm ${iconArrow()}</button>
    </div>
  `, false);
  document.getElementById('backBtn').onclick=()=>{ screen='landing'; screenLanding(); };
  document.getElementById('submitBtn').onclick=doCheckin;
  document.getElementById('nameInput').addEventListener('keydown', e=>{ if(e.key==='Enter') doCheckin(); });
}
async function doCheckin(){
  const val=document.getElementById('nameInput').value.trim();
  if(!val){ checkinError='กรุณากรอกชื่อจริง'; screenCheckin(); return; }
  screen='validating'; screenValidating();
  const res=await callApi('checkin', {name:val});
  if(screen!=='validating') return;
  if(!res.success){
    if(res.reason==='checkin_closed'){ checkinError='ยังไม่เปิดให้เช็คอิน — รอประกาศจากทีมงาน'; screen='checkin'; screenCheckin(); return; }
    checkinError = res.reason==='not_found' ? `ไม่พบชื่อ "${val}" ในรายชื่อ` : 'เกิดข้อผิดพลาด กรุณาลองใหม่';
    screen='notfound'; screenNotfound(val); return;
  }
  if(res.multiple){ screen='choose'; screenChoose(res.people); return; }
  applyProfile(res);
}
function applyProfile(res){
  setProfile({attendeeId:res.attendeeId, runNo:res.runNo, firstName:res.firstName, lastName:res.lastName, nick:res.nick, team:res.team, menu:res.menu, group:res.group});
  latestStatus=res;
  if(!res.checkedIn){ screen='gate'; screenGate(); } else { screen='hub'; screenHub(); }
}
function screenValidating(){
  shell(`<div class="screen" style="align-items:center;justify-content:center;text-align:center;gap:24px">
      <div class="dial-wrap"><div class="dial-ring"></div><div class="dial-inner">${iconSearch()}</div></div>
      <div><h2 class="title">กำลังตรวจสอบรายชื่อ…</h2><p class="subtitle">Checking list</p></div></div>`, false);
}

function screenChoose(people){
  shell(`<div class="screen">

/* ================= HUB (stamps) ================= */
const M_META=[
  {n:1, title:'Mission 1 · Session แรก', speaker:'Mew Social', sub:'สะท้อนสิ่งที่ได้จาก session ช่วงเช้า'},
  {n:2, title:'Mission 2 · Session สอง', speaker:'DataRockie', sub:'สะท้อนสิ่งที่ได้จาก session ช่วงบ่าย'},
  {n:3, title:'Mission 3 · AI NEXT Challenge', speaker:'', sub:'โหวตทีม + สรุปปิดงาน'}
];
async function screenHub(){
  if(screen!=='hub') return;
  const p=getProfile(); if(!p){ screen='landing'; screenLanding(); return; }
  const st=await callApi('getStatus', {attendeeId:p.attendeeId});
  if(screen!=='hub') return;
  if(!st.success){ clearProfile(); screen='landing'; screenLanding(); return; }
  latestStatus=st;
  if(!st.checkedIn){ screen='gate'; screenGate(); return; }
  const done=st.done||{}; const doneCount=(done.m1?1:0)+(done.m2?1:0)+(done.m3?1:0);
  function card(m){
    const isDone=done['m'+m.n], isOpen=st['mission'+m.n+'_open'];
    const cls=isDone?'st-done':(isOpen?'st-open':'st-lock');
    const mark=isDone?iconCheck():(isOpen?String(m.n):'🔒');
    const sub=isDone?'ส่งแล้ว':(isOpen? (m.speaker||m.sub) : 'ยังไม่เปิด — รอทีมงาน');
    const status=isDone?'เสร็จ':(isOpen?'ทำเลย':'ล็อก');
    const title=m.title+(m.speaker?` · ${m.speaker}`:'');
    const onClick=isDone?null:(isOpen?()=>openMission(m.n):()=>startCooldown(m.n));
    return {cls,mark,title,sub,status,onClick,isDone};
  }
  const cards=M_META.map(card);
  shell(`
    <div class="screen">
      <p class="subtitle">Your Attendee ID · ${esc(p.runNo||p.attendeeId)}${p.team?' · '+esc(p.team):''}</p>
      <h2 class="title">สวัสดี คุณ${esc(p.nick||p.firstName)}</h2>
      <p class="desc" style="margin-bottom:14px">สะสมแสตมป์ให้ครบ 3 ดวง เพื่อรับ E-Certificate</p>
      <div style="display:flex;align-items:center;gap:12px;background:var(--accent-soft);border:1px dashed var(--surface-brd);border-radius:14px;padding:12px 14px;margin-bottom:16px">
        <span style="flex-shrink:0;color:var(--accent)">${iconBox()}</span>
        <span style="font-size:13px;line-height:1.4;color:var(--text)">เมนูอาหารกลางวันของคุณ<br><span style="color:var(--muted);font-size:12.5px">${esc(p.menu||'รอยืนยันหน้างาน')}</span></span>
      </div>
      <div class="progress-card">
        <div class="row"><span style="font-family:'Chakra Petch';font-size:12px;letter-spacing:1px">แสตมป์ที่สะสม</span><span style="font-family:'Chakra Petch';font-weight:600;font-size:13px;color:var(--accent)">${doneCount}/3</span></div>
        <div class="progress-track"><div class="progress-fill" style="width:${Math.round(doneCount/3*100)}%"></div></div>
      </div>
      <div style="font-size:11px;letter-spacing:2px;color:var(--accent);text-transform:uppercase;font-family:'Chakra Petch';margin-bottom:10px">Missions</div>
      <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:auto">
        ${cards.map((c,i)=>`<button class="task-card ${c.isDone?'done':''}" data-idx="${i}" ${c.onClick?'':'style="cursor:default"'}>
            <div class="stamp ${c.cls}">${c.mark}</div>
            <div style="flex:1;text-align:left;min-width:0"><div class="ttitle">${c.title}</div><div class="tsub">${c.sub}</div></div>
            <span class="badge">${c.status}</span>
          </button>`).join('')}
      </div>
      <button class="cta-btn" id="toCertBtn">${iconCert()} ดู E-Certificate</button>
      <button class="ghost-btn" id="signOutBtn">ออกจากระบบ · Sign out</button>
    </div>
  `, true);
  document.getElementById('appbarDone').textContent=doneCount+'/3';
  cards.forEach((c,i)=>{ if(!c.onClick) return; const el=document.querySelector(`[data-idx="${i}"]`); if(el) el.onclick=c.onClick; });
  document.getElementById('toCertBtn').onclick=goCert;
  document.getElementById('signOutBtn').onclick=()=>{ clearProfile(); screen='landing'; screenLanding(); };
  stopHubPoll(); hubPollTimer=setInterval(screenHub, 6000);
}

/* ================= COOLDOWN ================= */
function startCooldown(n){ cooldownTarget=n; screen='cooldown'; screenCooldown(); }
function screenCooldown(){
  stopAllPolls();
  shell(`<div class="screen">
      <div class="kicker" style="color:var(--accent)"><span style="width:8px;height:8px;border-radius:50%;background:var(--accent);display:inline-block;animation:anx-blink 1.4s infinite"></span>Cooldown · Mission ${cooldownTarget}</div>
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:18px">
        <p class="desc" style="max-width:290px">Mission นี้ยังไม่เปิด — ทีมงานจะปลดล็อกให้ทุกคนพร้อมกัน หน้านี้จะเปลี่ยนอัตโนมัติ</p>
        <div class="dial-wrap"><div class="dial-ring"></div><div class="dial-inner">${iconClock()}</div></div>
      </div>
      <button class="ghost-btn" id="backHubBtn">กลับหน้ากิจกรรม · Back to hub</button>
    </div>`, true);
  document.getElementById('backHubBtn').onclick=()=>{ screen='hub'; screenHub(); };
  cooldownPollTimer=setInterval(checkCooldown, 3500); checkCooldown();
}
async function checkCooldown(){
  if(screen!=='cooldown') return;
  const p=getProfile(); const st=await callApi('getStatus',{attendeeId:p.attendeeId});
  if(screen!=='cooldown') return; latestStatus=st;
  if(st['mission'+cooldownTarget+'_open']){ stopCooldownPoll(); screen='hub'; screenHub(); }
}

/* ================= MISSION FORMS ================= */
const FORM_SESSION=[
  {k:'q1',t:'text',q:'วันนี้คุณได้อะไรจาก Session นี้มากที่สุด?'},
  {k:'q2',t:'text',q:'1 อย่างที่คุณจะเอาไปปรับใช้กับงานจริง'},
  {k:'q3',t:'seg',q:'ความยากของเนื้อหา',opts:['ง่าย','พอดี','ยาก']},
  {k:'q4',t:'scale5',q:'ความพึงพอใจต่อ Session นี้'},
  {k:'q5',t:'text',q:'สิ่งที่อยากให้ปรับปรุง'}
];
const FORMS = {
  1:{ items:FORM_SESSION },
  2:{ items:FORM_SESSION },
  3:{ items:[
    {k:'q1',t:'text',q:'AI NEXT Challenge ช่วยให้คุณได้นำสิ่งที่เรียนมาปรับใช้ในชีวิตจริงได้ไหม? ยังไงบ้าง?'},
    {k:'q2',t:'text',q:'3 สิ่งที่ได้กลับไปวันนี้'},
    {k:'q3',t:'scale5',q:'ให้คะแนนกิจกรรม AI NEXT Challenge'},
    {k:'q4',t:'scale5',q:'ให้คะแนนภาพรวมงาน AI NEXT Bootcamp by Bizcore'},
    {k:'q5',t:'scale5',q:'ให้คะแนนความสะดวก และความสะอาดของสถานที่/ห้องเรียน (Victor Club, Samyan Mitrtown)'},
    {k:'q6',t:'scale5',q:'ให้คะแนนความพึงพอใจต่ออาหาร ขนม และเครื่องดื่มที่เราจัดเตรียมไว้ให้'},
    {k:'q7',t:'scale5',q:'ให้คะแนนความพึงพอใจต่อ Staff/การลงทะเบียน/และการสื่อสารของทีมงาน ทั้งก่อนและหลังเริ่มงาน'},
    {k:'q8',t:'text',q:'จะแนะนำงานนี้ให้เพื่อนไหม?'},
    {k:'q9',t:'text',q:'รุ่นต่อไปอยากให้เชิญ Speaker AI ท่านไหนมา? เพราะอะไร?'},
    {k:'q10',t:'segcol',q:'สนใจร่วมงานกับ Bizcore ไหม?',opts:['สนใจมาก','สนใจแต่ขอดูความเหมาะสมก่อน','ยังไม่แน่ใจ','ไม่สนใจ']},
    {k:'q11',t:'segcol',q:'ถ้ามีการจัด AI Meetup ขึ้นหลังจบงาน AI NEXT Bootcamp คุณสนใจเข้าร่วม และแชร์เรื่องราวของตัวเองไหม?',opts:['สนใจแชร์แบบ Lightning Talk','สนใจเข้าร่วมฟังอย่างเดียว','ยังไม่แน่ใจ','ไม่สนใจ']},
    {k:'q12',t:'text',optional:true,q:'หัวข้อแบบไหนที่คุณสนใจอยากให้จัดใน AI Meetup? (ไม่บังคับ)'},
    {k:'q13',t:'text',q:'คำแนะนำเพิ่มเติม: อยากให้เราปรับปรุงอะไรใน AI NEXT Bootcamp รุ่นถัดไป?'}
  ]}
};
let curMission=0, answers={};
function openMission(n){
  stopAllPolls();
  curMission=n; answers={};
  const f=FORMS[n], meta=M_META[n-1], st=latestStatus||{};
  let h='';
  if(n===3){
    const opts=st.voteOptions||[], voted=st.myVote;
    h+=`<label class="q" style="margin-top:6px">${iconVote()} โหวตทีมที่คุณชอบที่สุดใน Group ${st.group||'-'} (โหวตได้ครั้งเดียว)</label>`;
    if(voted){ answers.vote=voted; h+=`<div class="voted-lock">✓ คุณโหวตให้ <b>${esc(voted)}</b> แล้ว</div>`; }
    else if(!opts.length){ h+=`<div class="error-msg">ยังไม่มีทีมให้โหวตในกลุ่มของคุณ</div>`; }
    else { h+=`<div class="seg col" id="voteSeg">${opts.map(t=>`<button type="button" onclick="pickVote(this)">${esc(t)}</button>`).join('')}</div>`; }
  }
  f.items.forEach((it,idx)=>{
    h+=`<label class="q">${idx+1}. ${esc(it.q)}</label>`;
    if(it.t==='text') h+=`<textarea class="field" data-k="${it.k}" oninput="answers[this.dataset.k]=this.value"></textarea>`;
    if(it.t==='scale5'||it.t==='scale10'){ const max=it.t==='scale5'?5:10; h+=`<div class="scale${max===10?' ten':''}">`; for(let i=1;i<=max;i++) h+=`<button type="button" onclick="pickScale(this,'${it.k}',${i})">${i}</button>`; h+=`</div>`; }
    if(it.t==='seg'||it.t==='segcol'){ h+=`<div class="seg${it.t==='segcol'?' col':''}">`; it.opts.forEach(o=>{ h+=`<button type="button" onclick="pickSeg(this,'${it.k}')">${esc(o)}</button>`; }); h+=`</div>`; }
  });
  shell(`<div class="screen">
      <button class="back-btn" id="mBack">${iconBack()}Hub</button>
      <div class="kicker"><span class="bar"></span>Mission ${n}</div>
      <h2 class="title" style="margin-top:8px">${esc(meta.title)}${meta.speaker?` · ${esc(meta.speaker)}`:''}</h2>
      <p class="desc" style="margin-bottom:6px">${esc(meta.sub)}</p>
      <div id="mBody">${h}</div>
      <div id="mErr"></div>
      <button class="cta-btn" id="mSubmit">ส่งคำตอบ · รับแสตมป์ 🎖</button>
    </div>`, true);
  document.getElementById('mBack').onclick=()=>{ screen='hub'; screenHub(); };
  document.getElementById('mSubmit').onclick=submitMission;
  screen='mission';
}
function pickScale(btn,k,v){ answers[k]=v; markSel(btn); }
function pickSeg(btn,k){ answers[k]=btn.textContent; markSel(btn); }
function pickVote(btn){ answers.vote=btn.textContent; markSel(btn); }
function markSel(btn){ Array.prototype.forEach.call(btn.parentNode.children,b=>b.classList.remove('sel')); btn.classList.add('sel'); }
async function submitMission(){
  const f=FORMS[curMission], missing=[];
  f.items.forEach((it,idx)=>{ if(it.optional) return; const v=answers[it.k]; if(v===undefined||String(v).trim()===''){ missing.push(idx+1); } });
  if(curMission===3 && !answers.vote){ document.getElementById('mErr').innerHTML='<p class="error-msg">กรุณาโหวตทีมก่อนส่งคำตอบ</p>'; return; }
  if(missing.length){ document.getElementById('mErr').innerHTML=`<p class="error-msg">ยังไม่ได้ตอบข้อ: ${missing.join(', ')}</p>`; return; }
  const btn=document.getElementById('mSubmit'); btn.disabled=true; btn.textContent='กำลังส่ง…';
  const p=getProfile();
  const res=await callApi('submitMission', {attendeeId:p.attendeeId, mission:curMission, answers});
  if(!res.success){ const msg=res.reason==='bad_vote'?'กรุณาเลือกทีมในกลุ่มของคุณ':'ส่งไม่สำเร็จ ลองอีกครั้ง'; document.getElementById('mErr').innerHTML=`<p class="error-msg">${msg}</p>`; btn.disabled=false; btn.textContent='ส่งคำตอบ · รับแสตมป์ 🎖'; return; }
  latestStatus=res; confetti();
  if(res.done&&res.done.m1&&res.done.m2&&res.done.m3){ screen='cert'; screenCert(); } else { screen='hub'; screenHub(); }
}

/* ================= CERTIFICATE ================= */
async function goCert(){ screen='cert'; const p=getProfile(); if(p){ const fresh=await callApi('getStatus',{attendeeId:p.attendeeId}); if(screen==='cert') latestStatus=fresh; } screenCert(); }
function screenCert(){
  stopAllPolls();
  const p=getProfile(); const st=latestStatus||{}; const done=st.done||{}; const all3=done.m1&&done.m2&&done.m3; const ready=all3&&st.cert_open;
  if(!ready){
    shell(`<div class="screen">
        <button class="back-btn" id="mBack">${iconBack()}Hub</button>
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:16px">
          <div style="width:96px;height:96px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--chip);border:1px solid var(--surface-brd)">${iconShield()}</div>
          <div><h2 class="title">ยังไม่ปลดล็อก</h2><p class="desc" style="max-width:280px">ทำครบทั้ง 3 Mission แล้ว E-Certificate จะออกให้เมื่อทีมงานประกาศ</p></div>
          <div style="width:100%;max-width:280px;display:flex;flex-direction:column;gap:8px">
            <div class="checklist-item"><span class="dot ${done.m1?'on':''}">${done.m1?iconCheck():''}</span><span style="flex:1;text-align:left">Mission 1</span></div>
            <div class="checklist-item"><span class="dot ${done.m2?'on':''}">${done.m2?iconCheck():''}</span><span style="flex:1;text-align:left">Mission 2</span></div>
            <div class="checklist-item"><span class="dot ${done.m3?'on':''}">${done.m3?iconCheck():''}</span><span style="flex:1;text-align:left">Mission 3</span></div>
          </div>
          <button class="ghost-btn" id="backHub2">กลับหน้ากิจกรรม</button>
        </div></div>`, true);
    document.getElementById('mBack').onclick=()=>{ screen='hub'; screenHub(); };
    document.getElementById('backHub2').onclick=()=>{ screen='hub'; screenHub(); };
    return;
  }
  const today=new Date().toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric'});
  shell(`<div class="screen">
      <button class="back-btn" id="mBack">${iconBack()}Hub</button>
      <h2 class="title">E-Certificate</h2>
      <p class="desc" style="margin-bottom:18px">ยินดีด้วย! คุณทำครบทั้ง 3 Mission แล้ว รอรับ Certificate ได้เลย!</p>
      <div class="cert-card" id="certCard">
        <div class="cert-shine"></div>
        <img src="${LOGO}" alt="AI NEXT by Bizcore" style="height:42px;width:auto;margin-bottom:16px">
        <div class="brand">Certificate of Completion</div>
        <div class="cname">${esc(p.firstName)} ${esc(p.lastName)}</div>
        <div class="cdesc">ได้เข้าร่วม AI NEXT Bootcamp ครบทุกกิจกรรม</div>
        <div class="cert-foot">
          <div><div class="l">Attendee ID</div><div class="v">${esc(p.runNo||p.attendeeId)}</div></div>
          <div style="text-align:right"><div class="l">Issued</div><div class="v">${today}</div></div>
        </div>
      </div>
      <div style="flex:1"></div>
      <button class="cta-btn" id="downloadBtn">บันทึก E-Certificate · Download</button>
    </div>`, true);
  document.getElementById('mBack').onclick=()=>{ screen='hub'; screenHub(); };
  confetti();
  document.getElementById('downloadBtn').onclick=()=>{
    html2canvas(document.getElementById('certCard'), {backgroundColor:'#8a1204', scale:2}).then(canvas=>{
      const link=document.createElement('a'); link.download='AI-NEXT-Certificate-'+p.firstName+'.png'; link.href=canvas.toDataURL('image/png'); link.click();
    });
  };
}

/* ================= INIT ================= */
(function init(){
  seedDemo();
  const p=getProfile();
  if(p){ screen='hub'; screenHub(); } else { screen='landing'; screenLanding(); }
})();
</script>
